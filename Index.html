<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>התזרים שלנו</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi15TXqteW16jXmdejINep15zXoNeVIiwic2hvcnRfbmFtZSI6Iuiq15bXqNeZ16MiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMGYxYSIsInRoZW1lX2NvbG9yIjoiIzBhMGYxYSJ9">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0a0f1a; --surface: #111827; --surface-light: #1a2235;
  --border: #1e3a5f; --accent: #22d3ee; --accent-dim: #0891b2;
  --accent-glow: rgba(34,211,238,0.15);
  --green: #34d399; --red: #f87171; --orange: #fbbf24; --purple: #a78bfa;
  --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b; --white: #f8fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', Arial, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; direction: rtl; overflow-x: hidden; }
input, select, button { font-family: inherit; outline: none; }
input:focus, select:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.header { background: linear-gradient(180deg, var(--surface-light), var(--bg)); padding: 14px 16px 6px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: var(--bg); }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; }
.month-nav button { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 4px 8px; }
.month-btn { background: var(--accent-glow); border: 1px solid rgba(34,211,238,0.25); border-radius: 10px; padding: 5px 18px; color: var(--accent); font-size: 15px; font-weight: 700; cursor: pointer; }

.tabs { display: flex; gap: 3px; background: var(--bg); padding: 3px; border-radius: 12px; margin: 10px 14px 16px; }
.tab { flex: 1; padding: 8px 4px; border-radius: 9px; border: none; background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; transition: all .2s; }
.tab.active { background: var(--surface-light); color: var(--accent); font-weight: 700; box-shadow: 0 0 12px var(--accent-glow); }
.tab-icon { font-size: 17px; display: block; margin-bottom: 2px; }

.content { padding: 0 14px 80px; animation: fadeIn .3s ease; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 14px; margin-bottom: 10px; }
.card-click { cursor: pointer; transition: border-color .2s; }
.card-click:active { border-color: var(--accent); }

.section-hdr { display: flex; align-items: center; justify-content: space-between; margin: 18px 2px 12px; }
.section-title { color: var(--white); font-size: 16px; font-weight: 700; }
.section-sub { color: var(--text-muted); font-size: 11px; margin-top: 1px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card { background: linear-gradient(135deg, var(--surface), var(--surface-light)); border-radius: 13px; padding: 12px 14px; border: 1px solid; }
.stat-label { color: var(--text-muted); font-size: 11px; margin-bottom: 3px; }
.stat-val { font-size: 21px; font-weight: 800; font-family: 'Courier New', monospace; direction: ltr; text-align: right; }

.num-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); padding: 9px 11px; font-size: 15px; font-weight: 600; width: 100%; direction: ltr; text-align: left; font-family: 'Courier New', monospace; }
.text-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 14px; width: 100%; direction: rtl; }
.select-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 13px; width: 100%; direction: rtl; }
label { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 3px; }

.btn { border: none; border-radius: 9px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all .2s; }
.btn-primary { background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: var(--bg); }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
.btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.btn-ghost { background: transparent; color: var(--text-dim); }
.btn-block { width: 100%; justify-content: center; }
.btn-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; padding: 3px; }
.btn-del-dim { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 3px; }

.badge { padding: 2px 9px; border-radius: 16px; font-size: 11px; font-weight: 600; white-space: nowrap; display: inline-block; }
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.flex1 { flex: 1; }
.mt8 { margin-top: 8px; } .mt16 { margin-top: 16px; } .mt24 { margin-top: 24px; } .mb8 { margin-bottom: 8px; } .mb10 { margin-bottom: 10px; }
.mono { font-family: 'Courier New', monospace; }
.empty { text-align: center; padding: 28px; color: var(--text-muted); }
.empty-icon { font-size: 34px; opacity: .5; margin-bottom: 6px; }

.overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-width: 480px; max-height: 82vh; overflow: auto; padding: 22px; border: 1px solid var(--border); border-bottom: none; animation: slideUp .3s ease; }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-close { background: var(--surface-light); border: none; color: var(--text-dim); width: 30px; height: 30px; border-radius: 15px; cursor: pointer; font-size: 17px; }
.modal h3 { color: var(--white); font-size: 17px; }

.fab { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); width: 54px; height: 54px; border-radius: 27px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); border: none; color: var(--bg); font-size: 27px; cursor: pointer; box-shadow: 0 4px 20px var(--accent-glow); display: flex; align-items: center; justify-content: center; z-index: 50; }

.save-status { font-size: 11px; animation: pulse 1s infinite; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ========== DATA ==========
const HEB_MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const STORAGE_KEY="cashflow_v2";
const gid=()=>'id_'+Math.random().toString(36).substr(2,9);
const fmtN=n=>{if(n==null||n==='')return'';const v=+n;return isNaN(v)?'':v.toLocaleString('he-IL')};
const mKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const mLabel=k=>{const[y,m]=k.split('-');return HEB_MONTHS[+m-1]+' '+y};

const DEFAULT_FUNDS=[
  {id:"f1",name:"קסם אקטיב כספית",accountNum:"5127881",type:"short"},
  {id:"f2",name:"אי.בי.אי",accountNum:"5137732",type:"short"},
  {id:"f3",name:"הראל כספית",accountNum:"5119409",type:"short"},
  {id:"f4",name:"אלטשולר שחם כספית",accountNum:"5138763",type:"short"},
  {id:"f5",name:"אנליסט",accountNum:"5120852",type:"short"},
  {id:"f6",name:"מגדל כספית",accountNum:"5134309",type:"long"},
  {id:"f7",name:"איילון כספית",accountNum:"5117700",type:"long"},
  {id:"f8",name:"ילין לפידות",accountNum:"5137641",type:"long"},
  {id:"f9",name:"הראל כספית 2",accountNum:"5137815",type:"long"},
];
const DEFAULT_DED=[
  {id:"g1",name:"חסכון לרכב",fundId:"f1",monthlyDeposit:515,balance:4015},
  {id:"g2",name:'תקציב בלת"מ',fundId:"f2",monthlyDeposit:40,balance:9290},
  {id:"g3",name:"חופשה לקיץ",fundId:"f3",monthlyDeposit:475,balance:5800},
  {id:"g4",name:"חסכון למוצרים לבית",fundId:"f4",monthlyDeposit:325,balance:8205},
  {id:"g5",name:"קייטנות",fundId:"f5",monthlyDeposit:455,balance:2415},
];
const DEFAULT_GEN=[
  {id:"gg1",name:"תקציב חלומות",balance:16350},
  {id:"gg2",name:"לימודים",balance:19090},
  {id:"gg3",name:"כסף כללי לבית",balance:79495},
];
const DEFAULT_ADD=[
  {id:"ag1",name:"תקציב משפחתי",budget:1000},
  {id:"ag2",name:"פיתוח אישי וזוגי ומשפחתי",budget:20000},
  {id:"ag3",name:"צדקה",budget:3060},
  {id:"ag4",name:"פסנתר",budget:300},
  {id:"ag5",name:"לימודים",budget:6040},
];
const DEFAULT_MIL=[
  {id:"m1",name:"קייטנות",budget:0},
  {id:"m2",name:"תקציב טיפולים",budget:4530},
  {id:"m3",name:"כללי",budget:230},
  {id:"m4",name:"טיול צורי זנזיבר",budget:3250},
];

function defaultMonth(){return{dedicatedGoals:JSON.parse(JSON.stringify(DEFAULT_DED)),generalGoals:JSON.parse(JSON.stringify(DEFAULT_GEN)),additionalGoals:JSON.parse(JSON.stringify(DEFAULT_ADD)),miluimBudget:JSON.parse(JSON.stringify(DEFAULT_MIL)),miluimTotal:8010,expenses:[],transfers:[]}}

// ========== STATE ==========
let state;
try{const s=localStorage.getItem(STORAGE_KEY);state=s?JSON.parse(s):null}catch(e){}
if(!state||!state.funds) state={funds:JSON.parse(JSON.stringify(DEFAULT_FUNDS)),months:{}};
let curMonth=mKey(new Date());
if(!state.months[curMonth]) state.months[curMonth]=defaultMonth();
let activeTab='dashboard';
let modal=null; // {type,data}
let saveTimer=null;

function save(){
  clearTimeout(saveTimer);
  showSave('saving');
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}
    showSave('saved');
    setTimeout(()=>showSave(null),1500);
  },600);
}
function showSave(s){
  const el=document.getElementById('save-status');
  if(!el)return;
  if(!s){el.className='hidden';return}
  el.className='save-status';
  el.style.color=s==='saving'?'var(--orange)':'var(--green)';
  el.textContent=s==='saving'?'שומר...':'נשמר ✓';
}
function ensureMonth(){if(!state.months[curMonth]){const keys=Object.keys(state.months).sort();const last=keys.length?state.months[keys[keys.length-1]]:null;state.months[curMonth]=last?JSON.parse(JSON.stringify({...last,expenses:[],transfers:[]})):defaultMonth()}}
function md(){return state.months[curMonth]}
function fund(id){return state.funds.find(f=>f.id===id)}
function navMonth(dir){const[y,m]=curMonth.split('-').map(Number);const d=new Date(y,m-1+dir,1);curMonth=mKey(d);ensureMonth();render()}

// ========== RENDER ENGINE ==========
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='on'&&typeof v==='object'){Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn))}
    else if(k==='style'&&typeof v==='string')el.setAttribute('style',v);
    else if(k==='className')el.className=v;
    else if(k==='value')el.value=v||'';
    else el.setAttribute(k,v||'');
  });
  children.flat(9).forEach(c=>{if(c==null)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)});
  return el;
}

function render(){
  ensureMonth();
  const m=md();
  const totDed=m.dedicatedGoals.reduce((s,g)=>s+(g.balance||0),0);
  const totGen=m.generalGoals.reduce((s,g)=>s+(g.balance||0),0);
  const totSav=totDed+totGen;
  const totExp=m.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totTr=m.transfers.reduce((s,t)=>s+(t.amount||0),0);
  const deposits=m.dedicatedGoals.reduce((s,g)=>s+(g.monthlyDeposit||0),0);

  const app=document.getElementById('app');
  app.innerHTML='';

  // HEADER
  const header=h('div',{className:'header'},
    h('div',{className:'header-row'},
      h('div',{className:'row',style:'gap:9px'},
        h('div',{className:'logo'},'₪'),
        h('div',null,h('div',{style:'color:var(--white);font-size:15px;font-weight:700'},'התזרים שלנו'),h('div',{style:'color:var(--text-muted);font-size:10px'},'ניהול תזרים חודשי'))
      ),
      h('div',{className:'row',style:'gap:8px'},
        h('span',{id:'save-status',className:'hidden'}),
        h('button',{className:'btn btn-secondary btn-sm',on:{click:exportXLSX}},'📤 ייצוא')
      )
    ),
    h('div',{className:'month-nav'},
      h('button',{on:{click:()=>navMonth(1)}},'›'),
      h('button',{className:'month-btn',on:{click:showMonthPicker}},mLabel(curMonth)),
      h('button',{on:{click:()=>navMonth(-1)}},'‹')
    )
  );
  app.appendChild(header);

  // TABS
  const tabs=[{id:'dashboard',icon:'📊',label:'סיכום'},{id:'goals',icon:'🎯',label:'יעדים'},{id:'expenses',icon:'💸',label:'הוצאות'},{id:'transfers',icon:'🔄',label:'העברות'},{id:'settings',icon:'⚙️',label:'הגדרות'}];
  const tabBar=h('div',{className:'tabs'},...tabs.map(t=>
    h('button',{className:'tab'+(activeTab===t.id?' active':''),on:{click:()=>{activeTab=t.id;render()}}},
      h('span',{className:'tab-icon'},t.icon),t.label)
  ));
  app.appendChild(tabBar);

  const content=h('div',{className:'content'});
  app.appendChild(content);

  // ===== DASHBOARD =====
  if(activeTab==='dashboard'){
    const grid=h('div',{className:'grid2',style:'margin-bottom:14px'},
      statCard('סה״כ חסכונות',totSav,'var(--accent)'),
      statCard('הפקדות חודשיות',deposits,'var(--green)'),
      statCard('הוצאות החודש',totExp,'var(--red)'),
      statCard('העברות מקרנות',totTr,'var(--purple)')
    );
    content.appendChild(grid);

    content.appendChild(secHdr('🎯','יעדים ספציפיים',m.dedicatedGoals.length+' יעדים'));
    m.dedicatedGoals.forEach(g=>{
      const f=fund(g.fundId);
      content.appendChild(h('div',{className:'card card-click',on:{click:()=>{activeTab='goals';render()}}},
        h('div',{className:'row-between'},
          h('div',null,h('div',{style:'color:var(--white);font-size:13px;font-weight:600'},g.name),h('div',{style:'color:var(--text-muted);font-size:11px;margin-top:1px'},f?.name||'')),
          h('div',{style:'text-align:left'},h('div',{style:'color:var(--accent);font-size:15px;font-weight:700',className:'mono'},'₪'+fmtN(g.balance)),h('div',{style:'color:var(--green);font-size:10px'},'+₪'+fmtN(g.monthlyDeposit)+'/חודש'))
        )
      ));
    });

    content.appendChild(secHdr('📦','יעדים כלליים','סה״כ ₪'+fmtN(totGen)));
    m.generalGoals.forEach(g=>{
      content.appendChild(h('div',{className:'card card-click',on:{click:()=>{activeTab='goals';render()}}},
        h('div',{className:'row-between'},
          h('div',{style:'color:var(--white);font-size:13px;font-weight:600'},g.name),
          h('div',{style:'color:var(--orange);font-size:15px;font-weight:700',className:'mono'},'₪'+fmtN(g.balance))
        )
      ));
    });

    if(m.expenses.length){
      content.appendChild(secHdr('💸','הוצאות אחרונות'));
      m.expenses.slice(-3).reverse().forEach(e=>{
        content.appendChild(h('div',{className:'card'},
          h('div',{className:'row-between'},
            h('div',null,h('div',{style:'color:var(--white);font-size:13px'},e.description),e.source?h('span',{className:'badge',style:'background:rgba(52,211,153,.15);color:var(--green);margin-top:4px'},e.source):null),
            h('div',{style:'color:var(--red);font-size:15px;font-weight:700',className:'mono'},'₪'+fmtN(e.amount))
          )
        ));
      });
    }
  }

  // ===== GOALS =====
  else if(activeTab==='goals'){
    content.appendChild(secHdr('🎯','יעדים ספציפיים','עם הוראות קבע',addBtn(()=>{m.dedicatedGoals.push({id:gid(),name:'יעד חדש',fundId:'',monthlyDeposit:0,balance:0});save();render()})));
    m.dedicatedGoals.forEach((g,i)=>{
      const f=fund(g.fundId);
      const card=h('div',{className:'card'},
        h('div',{className:'row-between mb8'},
          textInput(g.name,v=>{g.name=v;save()},{style:'width:65%;font-weight:600'}),
          h('button',{className:'btn-del',on:{click:()=>{if(confirm('למחוק?')){m.dedicatedGoals.splice(i,1);save();render()}}}},'🗑')
        ),
        h('div',{className:'grid2 mb8'},
          h('div',null,h('label',null,'יתרה'),numInput(g.balance,v=>{g.balance=v;save()})),
          h('div',null,h('label',null,'הפקדה חודשית'),numInput(g.monthlyDeposit,v=>{g.monthlyDeposit=v;save()}))
        ),
        h('div',null,h('label',null,'קרן'),fundSelect(g.fundId,'short',v=>{g.fundId=v;save()}))
      );
      content.appendChild(card);
    });

    content.appendChild(h('div',{style:'margin-top:22px'}));
    content.appendChild(secHdr('📦','יעדים כלליים','כסף מפוזר בקרנות',addBtn(()=>{m.generalGoals.push({id:gid(),name:'יעד חדש',balance:0});save();render()})));
    m.generalGoals.forEach((g,i)=>{
      content.appendChild(h('div',{className:'card'},h('div',{className:'row'},
        textInput(g.name,v=>{g.name=v;save()},{style:'flex:1;font-weight:600'}),
        numInput(g.balance,v=>{g.balance=v;save()},{style:'width:110px'}),
        h('button',{className:'btn-del',on:{click:()=>{if(confirm('למחוק?')){m.generalGoals.splice(i,1);save();render()}}}},'🗑')
      )));
    });

    content.appendChild(h('div',{style:'margin-top:22px'}));
    content.appendChild(secHdr('📋','תקציבים נוספים','',addBtn(()=>{(m.additionalGoals=m.additionalGoals||[]).push({id:gid(),name:'חדש',budget:0});save();render()})));
    (m.additionalGoals||[]).forEach((g,i)=>{
      content.appendChild(h('div',{className:'card'},h('div',{className:'row'},
        textInput(g.name,v=>{g.name=v;save()},{style:'flex:1'}),
        numInput(g.budget,v=>{g.budget=v;save()},{style:'width:90px'}),
        h('button',{className:'btn-del',on:{click:()=>{m.additionalGoals.splice(i,1);save();render()}}},  '🗑')
      )));
    });

    content.appendChild(h('div',{style:'margin-top:22px'}));
    content.appendChild(secHdr('🎖️','תקציב מענק מילואים','סה״כ ₪'+fmtN(m.miluimTotal||0)));
    const milCard=h('div',{className:'card'},
      h('div',{className:'mb10'},h('label',null,'סה״כ תקציב מענק'),numInput(m.miluimTotal||0,v=>{m.miluimTotal=v;save()}))
    );
    (m.miluimBudget||[]).forEach((item,i)=>{
      milCard.appendChild(h('div',{className:'row mt8'},
        textInput(item.name,v=>{item.name=v;save()},{style:'flex:1'}),
        numInput(item.budget,v=>{item.budget=v;save()},{style:'width:90px'})
      ));
    });
    milCard.appendChild(h('button',{className:'btn btn-ghost btn-sm btn-block mt8',on:{click:()=>{(m.miluimBudget=m.miluimBudget||[]).push({id:gid(),name:'',budget:0});save();render()}}},'+ הוסף סעיף'));
    content.appendChild(milCard);
  }

  // ===== EXPENSES =====
  else if(activeTab==='expenses'){
    content.appendChild(secHdr('💸','הוצאות החודש','סה״כ ₪'+fmtN(totExp),addBtn(()=>openExpenseModal())));
    if(!m.expenses.length){content.appendChild(h('div',{className:'empty'},h('div',{className:'empty-icon'},'📝'),h('div',null,'אין הוצאות עדיין')));
    }else{
      const cats={};m.expenses.forEach(e=>{const c=e.category||'ללא קטגוריה';(cats[c]=cats[c]||[]).push(e)});
      Object.entries(cats).forEach(([cat,items])=>{
        content.appendChild(h('div',{className:'row-between',style:'margin:14px 2px 6px;font-size:12px;font-weight:600;color:var(--text-muted)'},h('span',null,cat),h('span',{style:'color:var(--red)'},'₪'+fmtN(items.reduce((s,e)=>s+e.amount,0)))));
        items.forEach(e=>{
          const allGoals=[...m.dedicatedGoals,...m.generalGoals];
          const goalName=allGoals.find(g=>g.id===e.goalId)?.name||'';
          content.appendChild(h('div',{className:'card card-click',on:{click:()=>openExpenseModal(e)}},
            h('div',{className:'row-between'},
              h('div',null,
                h('div',{style:'color:var(--white);font-size:13px'},e.description),
                h('div',{className:'row',style:'gap:5px;margin-top:3px'},
                  e.source?h('span',{className:'badge',style:'background:rgba(52,211,153,.15);color:var(--green)'},e.source):null,
                  goalName?h('span',{className:'badge',style:'background:rgba(167,139,250,.15);color:var(--purple)'},goalName):null
                )
              ),
              h('div',{className:'row',style:'gap:6px'},
                h('span',{style:'color:var(--red);font-size:15px;font-weight:700',className:'mono'},'₪'+fmtN(e.amount)),
                h('button',{className:'btn-del-dim',on:{click:ev=>{ev.stopPropagation();m.expenses=m.expenses.filter(x=>x.id!==e.id);save();render()}}},'🗑')
              )
            )
          ));
        });
      });
    }
  }

  // ===== TRANSFERS =====
  else if(activeTab==='transfers'){
    content.appendChild(secHdr('🔄','העברות מקרנות','סה״כ ₪'+fmtN(totTr),addBtn(()=>openTransferModal())));
    content.appendChild(h('div',{className:'card',style:'background:var(--accent-glow);border-color:rgba(34,211,238,.25);margin-bottom:14px'},h('div',{style:'color:var(--text-dim);font-size:12px;line-height:1.6'},'כאן מתעדים העברות מהקרנות הכספיות לעו״ש בסוף החודש.')));
    if(!m.transfers.length){content.appendChild(h('div',{className:'empty'},h('div',{className:'empty-icon'},'🔄'),h('div',null,'אין העברות עדיין')));
    }else{
      m.transfers.forEach(t=>{
        const f=fund(t.fundId);
        content.appendChild(h('div',{className:'card card-click',on:{click:()=>openTransferModal(t)}},
          h('div',{className:'row-between'},
            h('div',null,h('div',{style:'color:var(--white);font-size:13px'},f?.name||'קרן'),h('div',{style:'color:var(--text-muted);font-size:11px;margin-top:1px'},(f?.accountNum||'')+' → '+(t.goalName||'עו״ש'))),
            h('div',{style:'color:var(--purple);font-size:15px;font-weight:700',className:'mono'},'₪'+fmtN(t.amount))
          )
        ));
      });
    }
    content.appendChild(h('div',{style:'margin-top:22px'}));
    content.appendChild(secHdr('🏦','קרנות כספיות'));
    state.funds.forEach(f=>{
      content.appendChild(h('div',{className:'card'},h('div',{className:'row-between'},
        h('div',null,h('div',{style:'color:var(--white);font-size:13px;font-weight:600'},f.name),h('div',{style:'color:var(--text-muted);font-size:11px'},f.accountNum)),
        h('span',{className:'badge',style:'background:rgba('+(f.type==='short'?'34,211,238':'251,191,36')+',.15);color:var(--'+(f.type==='short'?'accent':'orange')+')'},f.type==='short'?'שוטף':'טווח רחוק')
      )));
    });
  }

  // ===== SETTINGS =====
  else if(activeTab==='settings'){
    content.appendChild(secHdr('🏦','ניהול קרנות','',addBtn(()=>{state.funds.push({id:gid(),name:'קרן חדשה',accountNum:'',type:'short'});save();render()})));
    state.funds.forEach((f,i)=>{
      content.appendChild(h('div',{className:'card'},
        h('div',{className:'row mb8'},
          textInput(f.name,v=>{f.name=v;save()},{style:'flex:1',placeholder:'שם הקרן'}),
          textInput(f.accountNum,v=>{f.accountNum=v;save()},{style:'width:100px;direction:ltr;text-align:left',placeholder:'מס׳ חשבון'})
        ),
        h('div',{className:'row-between'},
          h('div',{className:'row',style:'gap:5px'},
            h('button',{className:'btn btn-sm',style:'background:'+(f.type==='short'?'rgba(34,211,238,.2)':'var(--bg)')+';color:'+(f.type==='short'?'var(--accent)':'var(--text-muted)'),on:{click:()=>{f.type='short';save();render()}}},'שוטף'),
            h('button',{className:'btn btn-sm',style:'background:'+(f.type==='long'?'rgba(251,191,36,.2)':'var(--bg)')+';color:'+(f.type==='long'?'var(--orange)':'var(--text-muted)'),on:{click:()=>{f.type='long';save();render()}}},'טווח רחוק')
          ),
          h('button',{className:'btn-del',on:{click:()=>{if(confirm('למחוק?')){state.funds.splice(i,1);save();render()}}}},'🗑')
        )
      ));
    });

    content.appendChild(h('div',{style:'margin-top:22px'}));
    content.appendChild(secHdr('💾','נתונים'));
    const dataCard=h('div',{className:'card'},
      h('button',{className:'btn btn-secondary btn-block mb10',on:{click:exportXLSX}},'📤 ייצוא לאקסל (xlsx)'),
      h('button',{className:'btn btn-secondary btn-block mb10',on:{click:()=>{
        const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='cashflow_backup.json';a.click();
      }}},'💾 גיבוי (JSON)'),
      h('button',{className:'btn btn-secondary btn-block mb10',on:{click:()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.funds&&d.months){state=d;save();render();alert('שוחזר!')}}catch(e){alert('קובץ לא תקין')}};r.readAsText(f)};inp.click()}}},'📥 שחזור מגיבוי'),
      h('button',{className:'btn btn-danger btn-block',on:{click:()=>{if(confirm('למחוק הכל?')){localStorage.removeItem(STORAGE_KEY);location.reload()}}}},'🗑 איפוס')
    );
    content.appendChild(dataCard);

    content.appendChild(h('div',{className:'card',style:'margin-top:14px;background:var(--accent-glow);border-color:rgba(34,211,238,.2)'},
      h('div',{style:'color:var(--text-dim);font-size:12px;line-height:1.8'},
        h('strong',{style:'color:var(--accent)'},'איך להשתמש:'),h('br'),
        '1. עדכן יתרות בתחילת כל חודש',h('br'),
        '2. הוסף הוצאות במשך החודש',h('br'),
        '3. בסוף החודש תעד העברות מקרנות',h('br'),
        '4. ייצא לאקסל כגיבוי'
      )
    ));
  }

  // FAB
  if(activeTab==='dashboard'||activeTab==='expenses'){
    const fab=h('button',{className:'fab',on:{click:openExpenseModal}},'+');
    app.appendChild(fab);
  }
}

// ========== HELPERS ==========
function statCard(label,val,color){
  return h('div',{className:'stat-card',style:'border-color:'+color+'30'},
    h('div',{className:'stat-label'},label),
    h('div',{className:'stat-val',style:'color:'+color},'₪'+fmtN(val))
  );
}
function secHdr(icon,title,sub,action){
  return h('div',{className:'section-hdr'},
    h('div',{className:'row',style:'gap:8px'},h('span',{style:'font-size:20px'},icon),h('div',null,h('div',{className:'section-title'},title),sub?h('div',{className:'section-sub'},sub):null)),
    action||null
  );
}
function addBtn(fn){return h('button',{className:'btn btn-primary btn-sm',on:{click:fn}},'+ הוסף')}
function numInput(val,onChange,opts={}){
  const inp=h('input',{type:'tel',inputMode:'decimal',className:'num-input',value:val?.toString()||'',style:opts.style||''});
  inp.addEventListener('input',()=>{const v=inp.value.replace(/[^\d.\-]/g,'');inp.value=v;onChange(parseFloat(v)||0)});
  return inp;
}
function textInput(val,onChange,opts={}){
  const inp=h('input',{type:'text',className:'text-input',value:val||'',placeholder:opts.placeholder||'',style:opts.style||''});
  inp.addEventListener('input',()=>onChange(inp.value));
  return inp;
}
function fundSelect(val,type,onChange){
  const sel=h('select',{className:'select-input',value:val||''},h('option',{value:''},'בחר קרן'));
  state.funds.filter(f=>!type||f.type===type).forEach(f=>{
    const opt=h('option',{value:f.id},f.name+' ('+f.accountNum+')');
    if(f.id===val)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change',()=>onChange(sel.value));
  return sel;
}

// ========== MODALS ==========
function openExpenseModal(existing){
  const item=existing?{...existing}:{id:gid(),description:'',amount:0,source:'',category:'',goalId:''};
  const m=md();
  showModal('הוצאה',container=>{
    const fields=[
      {label:'תיאור',el:textInput(item.description,v=>item.description=v,{placeholder:'מה ההוצאה?'})},
      {label:'סכום',el:numInput(item.amount,v=>item.amount=v)},
      {label:'מקור / הערה',el:textInput(item.source,v=>item.source=v,{placeholder:'פייבוקס, אשראי...'})},
      {label:'קטגוריה',el:textInput(item.category,v=>item.category=v,{placeholder:'תרומה, טיפולים...'})},
    ];
    fields.forEach(f=>{const d=h('div',{style:'margin-bottom:12px'},h('label',null,f.label),f.el);container.appendChild(d)});
    // Goal select
    const goalSel=h('select',{className:'select-input'},h('option',{value:''},'ללא שיוך'));
    const og1=h('optgroup',{label:'יעדים ספציפיים'});m.dedicatedGoals.forEach(g=>{const o=h('option',{value:g.id},g.name);if(g.id===item.goalId)o.selected=true;og1.appendChild(o)});
    const og2=h('optgroup',{label:'יעדים כלליים'});m.generalGoals.forEach(g=>{const o=h('option',{value:g.id},g.name);if(g.id===item.goalId)o.selected=true;og2.appendChild(o)});
    goalSel.appendChild(og1);goalSel.appendChild(og2);
    goalSel.addEventListener('change',()=>item.goalId=goalSel.value);
    container.appendChild(h('div',{style:'margin-bottom:16px'},h('label',null,'שייך ליעד'),goalSel));
    container.appendChild(h('button',{className:'btn btn-primary btn-block',on:{click:()=>{
      const idx=m.expenses.findIndex(e=>e.id===item.id);
      if(idx>=0)m.expenses[idx]=item;else m.expenses.push(item);
      save();closeModal();render();
    }}},'שמור'));
  });
}

function openTransferModal(existing){
  const item=existing?{...existing}:{id:gid(),fundId:'',amount:0,goalName:''};
  const m=md();
  showModal('העברה מקרן',container=>{
    const fundSel=h('select',{className:'select-input'},h('option',{value:''},'בחר קרן'));
    state.funds.forEach(f=>{const o=h('option',{value:f.id},f.name+' ('+f.accountNum+')');if(f.id===item.fundId)o.selected=true;fundSel.appendChild(o)});
    fundSel.addEventListener('change',()=>item.fundId=fundSel.value);
    container.appendChild(h('div',{style:'margin-bottom:12px'},h('label',null,'מאיזו קרן'),fundSel));
    container.appendChild(h('div',{style:'margin-bottom:12px'},h('label',null,'סכום'),numInput(item.amount,v=>item.amount=v)));
    container.appendChild(h('div',{style:'margin-bottom:16px'},h('label',null,'עבור יעד / הערה'),textInput(item.goalName,v=>item.goalName=v,{placeholder:'לאיזה יעד'})));
    container.appendChild(h('button',{className:'btn btn-primary btn-block',on:{click:()=>{
      const idx=m.transfers.findIndex(t=>t.id===item.id);
      if(idx>=0)m.transfers[idx]=item;else m.transfers.push(item);
      save();closeModal();render();
    }}},'שמור'));
  });
}

function showMonthPicker(){
  showModal('בחר חודש',container=>{
    const grid=h('div',{style:'display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px'});
    Object.keys(state.months).sort().reverse().forEach(k=>{
      grid.appendChild(h('button',{style:'padding:10px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:'+(k===curMonth?'rgba(34,211,238,.2)':'var(--bg)')+';color:'+(k===curMonth?'var(--accent)':'var(--text-dim)')+';font-weight:'+(k===curMonth?'700':'400'),on:{click:()=>{curMonth=k;ensureMonth();closeModal();render()}}},mLabel(k)));
    });
    container.appendChild(grid);
  });
}

function showModal(title,buildFn){
  closeModal();
  const overlay=h('div',{className:'overlay',id:'modal-overlay'});
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
  const modalEl=h('div',{className:'modal'});
  const hdr=h('div',{className:'modal-hdr'},h('h3',null,title),h('button',{className:'modal-close',on:{click:closeModal}},'×'));
  modalEl.appendChild(hdr);
  const container=h('div');
  buildFn(container);
  modalEl.appendChild(container);
  overlay.appendChild(modalEl);
  document.body.appendChild(overlay);
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove()}

// ========== XLSX EXPORT ==========
function exportXLSX(){
  const m=md();const ml=mLabel(curMonth);
  const totDed=m.dedicatedGoals.reduce((s,g)=>s+(g.balance||0),0);
  const totGen=m.generalGoals.reduce((s,g)=>s+(g.balance||0),0);
  const deposits=m.dedicatedGoals.reduce((s,g)=>s+(g.monthlyDeposit||0),0);
  const totExp=m.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totTr=m.transfers.reduce((s,t)=>s+(t.amount||0),0);

  const rows=[
    ["חסכונות לשוטף","","","דברים נוספים","","","","תקציב מענק מילואים","",""],
    ["קרן","מספר חשבון","יעד (יתרה)","יעד","תקציב","","","סעיף","תקציב",""]
  ];
  m.dedicatedGoals.forEach((g,i)=>{
    const f=fund(g.fundId);
    const row=[f?.name||'',f?.accountNum||'',g.name+' (₪'+g.balance+')','',"","","","","",""];
    if(m.additionalGoals&&m.additionalGoals[i]){row[3]=m.additionalGoals[i].name;row[4]=m.additionalGoals[i].budget}
    if(m.miluimBudget&&m.miluimBudget[i]){row[7]=m.miluimBudget[i].name;row[8]=m.miluimBudget[i].budget}
    rows.push(row);
  });
  rows.push([]);
  rows.push(["חסכונות טווח רחוק"]);
  m.generalGoals.forEach(g=>rows.push(["","",g.name+' (₪'+g.balance+')']));
  rows.push([]);
  rows.push(['סה"כ חסכונות','',totDed+totGen,'סה"כ תקציבים',(m.additionalGoals||[]).reduce((s,g)=>s+(g.budget||0),0),'','','סה"כ מענק',m.miluimTotal||0]);
  rows.push([]);
  rows.push(['הוצאות חודש '+ml+' להחזר']);
  rows.push(['תיאור','סכום','מקור','קטגוריה','שייך ליעד']);
  m.expenses.forEach(e=>{
    const gn=[...m.dedicatedGoals,...m.generalGoals].find(g=>g.id===e.goalId)?.name||'';
    rows.push([e.description,e.amount,e.source||'',e.category||'',gn]);
  });
  rows.push(['סה"כ הוצאות',totExp]);
  rows.push([]);
  rows.push(['העברות מקרנות לעו"ש']);
  rows.push(['מקרן','מספר חשבון','סכום','ליעד']);
  m.transfers.forEach(t=>{const f=fund(t.fundId);rows.push([f?.name||'',f?.accountNum||'',t.amount,t.goalName||''])});
  rows.push(['סה"כ העברות','',totTr]);

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:14},{wch:20},{wch:22},{wch:12},{wch:8},{wch:3},{wch:22},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,ml);
  XLSX.writeFile(wb,'התזרים_שלנו_'+ml.replace(' ','_')+'.xlsx');
}

// ========== INIT ==========
render();
</script>
