<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ניהול תזרים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#131210;--s1:#1e1d18;--s2:#26251f;--bd:#2e2d28;--t1:#e8e6e1;--t2:#8a8780;--t3:#5a5850;--gold:#c9a84c;--gold2:#a68932;--grn:#7ecba1;--red:#e8927c;--r:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t1);direction:rtl;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

#app{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;height:100%;height:100vh}
.hdr{-webkit-flex-shrink:0;flex-shrink:0;padding:12px 16px;background:var(–s1);border-bottom:1px solid var(–bd)}
.hdr-top{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;background:-webkit-linear-gradient(315deg,var(–gold),var(–gold2));background:linear-gradient(135deg,var(–gold),var(–gold2));display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:20px;font-weight:700;color:var(–bg);-webkit-flex-shrink:0;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:700;line-height:1.2}
.hdr p{font-size:12px;color:var(–t2)}
.hdr-act{margin-right:auto;display:-webkit-flex;display:flex;gap:6px}
.ib{width:36px;height:36px;border:1px solid var(–bd);border-radius:8px;background:var(–s2);color:var(–t2);font-size:16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.ib:active{background:var(–bd)}
.ib input[type=file]{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;cursor:pointer;font-size:0}
.mbar{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:var(–bg);border:1px solid var(–bd);border-radius:10px}
.mbar .ci{font-size:16px;color:var(–gold);-webkit-flex-shrink:0;flex-shrink:0}
.mbar select{-webkit-flex:1;flex:1;padding:6px 8px;background:var(–s2);border:1px solid var(–bd);border-radius:6px;color:var(–t1);font-family:‘Heebo’,sans-serif;font-size:14px;font-weight:500;direction:rtl;outline:none;-webkit-appearance:none;appearance:none}
.mbar select:focus{border-color:var(–gold)}
.mbar input[type=number]{width:72px;padding:6px 8px;background:var(–s2);border:1px solid var(–bd);border-radius:6px;color:var(–t1);font-family:‘Heebo’,sans-serif;font-size:14px;font-weight:500;text-align:center;outline:none;direction:ltr}
.mbar input:focus{border-color:var(–gold)}
.rbar{display:-webkit-flex;display:flex;gap:8px;margin-top:8px}
.rb{-webkit-flex:1;flex:1;padding:9px 10px;background:var(–s2);border:1px solid var(–bd);border-radius:8px;color:var(–t2);font-family:‘Heebo’,sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:5px}
.rb:active{background:var(–bd);color:var(–t1)}
.cnt{-webkit-flex:1;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px 80px}
.tbar{-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;background:var(–s1);border-top:1px solid var(–bd);padding-bottom:env(safe-area-inset-bottom,0px)}
.tb{-webkit-flex:1;flex:1;padding:8px 2px 10px;background:none;border:none;color:var(–t3);font-family:‘Heebo’,sans-serif;cursor:pointer;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;gap:3px;position:relative}
.tb.on{color:var(–gold)}
.tb.on::before{content:’’;position:absolute;top:0;left:20%;right:20%;height:2px;background:var(–gold);border-radius:0 0 2px 2px}
.tb .ic{font-size:18px}
.tb .lb{font-size:10px;font-weight:500}
.sh{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin-bottom:14px}
.sh .ic{font-size:18px;color:var(–gold)}
.sh h2{font-size:16px;font-weight:600}
.cl{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px}
.cd{background:var(–s1);border:1px solid var(–bd);border-radius:var(–r);padding:12px;position:relative}
.cd:focus-within{border-color:var(–gold)}
.cr{display:-webkit-flex;display:flex;gap:8px;margin-bottom:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.cr:last-child{margin-bottom:0}
.fd{-webkit-flex:1;flex:1;min-width:0}
.fd.fu{-webkit-flex-basis:100%;flex-basis:100%}
.fd label{display:block;font-size:11px;font-weight:500;color:var(–t2);margin-bottom:4px}
.fd input,.fd select{width:100%;padding:9px 10px;background:var(–bg);border:1px solid var(–bd);border-radius:8px;color:var(–t1);font-family:‘Heebo’,sans-serif;font-size:14px;direction:rtl;outline:none}
.fd input:focus,.fd select:focus{border-color:var(–gold)}
.fd input::placeholder{color:var(–t3)}
.fd select{-webkit-appearance:none;appearance:none}
.dx{position:absolute;top:8px;left:8px;width:26px;height:26px;border:none;background:none;color:var(–t3);font-size:14px;cursor:pointer;border-radius:6px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center}
.dx:active{background:var(–bd);color:var(–red)}
.ab{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:6px;width:100%;padding:14px;margin-top:10px;background:none;border:1.5px dashed var(–bd);border-radius:var(–r);color:var(–t2);font-family:‘Heebo’,sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.ab:active{background:var(–s1)}
.tot{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;padding:14px 16px;margin-top:10px;background:var(–s2);border-radius:var(–r);border:1px solid var(–bd)}
.tot .l{font-size:13px;font-weight:600;color:var(–t2)}
.tot .v{font-size:20px;font-weight:700;color:var(–gold)}
.cs{margin-top:24px}
.cs h3{font-size:14px;color:var(–t2);font-weight:600;margin-bottom:12px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc{background:var(–s1);border:1px solid var(–bd);border-radius:var(–r);padding:12px}
.cc .n{font-size:12px;color:var(–t2);margin-bottom:2px}
.cc .a{font-size:16px;font-weight:600;margin-bottom:8px}
.cc .bb{height:3px;background:var(–bd);border-radius:2px;overflow:hidden}
.cc .bf{height:100%;background:-webkit-linear-gradient(0deg,var(–gold),var(–gold2));background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:2px}
.cc .p{font-size:11px;color:var(–t3);margin-top:4px;text-align:left}
.ss{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:14px;max-width:400px;margin:0 auto}
.sc{background:var(–s1);border:1px solid var(–bd);border-radius:14px;padding:22px 16px;text-align:center}
.sc .ic{font-size:22px;color:var(–gold);margin-bottom:6px}
.sc .l{font-size:13px;color:var(–t2);margin-bottom:4px}
.sc .a{font-size:24px;font-weight:700}
.sd{text-align:center}
.so{display:-webkit-inline-flex;display:inline-flex;width:32px;height:32px;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;border-radius:50%;background:var(–s2);border:1px solid var(–bd);color:var(–t2);font-size:16px;font-weight:700}
.sc.res{border-width:2px}
.sc .su{font-size:12px;margin-top:4px}
.toast{position:fixed;bottom:80px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);background:var(–s2);border:1px solid var(–bd);color:var(–t1);padding:10px 20px;border-radius:10px;font-family:‘Heebo’,sans-serif;font-size:13px;z-index:999;-webkit-animation:ti .3s,to .3s 1.7s forwards;animation:ti .3s,to .3s 1.7s forwards;white-space:nowrap}
@-webkit-keyframes ti{from{opacity:0;-webkit-transform:translateX(-50%) translateY(10px)}to{opacity:1;-webkit-transform:translateX(-50%) translateY(0)}}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@-webkit-keyframes to{to{opacity:0;-webkit-transform:translateX(-50%) translateY(10px)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
#errbox{position:fixed;top:40px;left:10px;right:10px;background:#c00;color:#fff;padding:12px;border-radius:8px;font-size:13px;z-index:9999;display:none;direction:ltr;word-break:break-all}
</style>

</head>
<body>
<div id="app"></div>
<div id="errbox"></div>

<script>
window.onerror = function(msg, url, line, col, err) {
  var box = document.getElementById("errbox");
  if (box) { box.style.display = "block"; box.textContent = "Error: " + msg + " (line " + line + ")"; }
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
try {

var BASE_CATS = ["דיור","חינוך","בריאות","תחבורה","מזון","בילויים","ביגוד","חשבונות","ביטוח"];
var customCats = [];
function allCats() { return BASE_CATS.concat(customCats); }

var TABS = [
  {id:"equity", lb:"הון עצמי", ic:"\u25C6"},
  {id:"savings", lb:"חסכונות", ic:"\u25CE"},
  {id:"planned", lb:"הוצאות מתוכננות", ic:"\u25A4"},
  {id:"monthly", lb:"תזרים חודשי", ic:"\u25F7"},
  {id:"summary", lb:"סיכום", ic:"\u03A3"}
];
var HMON = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

var _uid = 0;
function uid() { _uid++; return "r" + _uid + "_" + Date.now(); }
function mkE() { return {id:uid(), name:"", number:"", value:"", notes:""}; }
function mkS() { return {id:uid(), name:"", number:"", value:"", target:"", notes:""}; }
function mkP() { return {id:uid(), expense:"", amount:"", category:"", notes:""}; }
function mkM() { return {id:uid(), expense:"", amount:"", notes:""}; }

var _now = new Date();
var S = {
  tab: "equity",
  month: _now.getMonth(),
  year: _now.getFullYear(),
  equity: [mkE()],
  savings: [mkS()],
  planned: [mkP()],
  monthly: [mkM()]
};

function fmt(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return "\u20AA0";
  return "\u20AA" + n.toLocaleString("he-IL");
}
function mLabel() { return HMON[S.month] + " " + S.year; }
function esc(s) {
  var str = String(s == null ? "" : s);
  return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function toast(msg) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 2100);
}

// ── Global handlers ──
function switchTab(id) { S.tab = id; render(); }
function setMonth(v) { S.month = parseInt(v, 10); render(); }
function setYear(v) { var y = parseInt(v, 10); if (y >= 2020 && y <= 2040) S.year = y; }
function upd(t, i, k, v) { S[t][i][k] = v; }

function addRow(t) {
  if (t === "equity") S.equity.push(mkE());
  else if (t === "savings") S.savings.push(mkS());
  else if (t === "planned") S.planned.push(mkP());
  else if (t === "monthly") S.monthly.push(mkM());
  render();
  setTimeout(function() { var c = document.querySelector(".cnt"); if (c) c.scrollTop = c.scrollHeight; }, 50);
}
function delRow(t, i) {
  if (S[t].length <= 1) return;
  S[t].splice(i, 1);
  render();
}

function handleCatSelect(el, tab, idx, key) {
  if (el.value === "__new__") {
    var wrap = el.parentNode;
    var inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = "הזן שם קטגוריה...";
    inp.style.width = "100%";
    inp.style.padding = "9px 10px";
    inp.style.background = "#131210";
    inp.style.border = "1.5px solid #c9a84c";
    inp.style.borderRadius = "8px";
    inp.style.color = "#e8e6e1";
    inp.style.fontFamily = "Heebo, sans-serif";
    inp.style.fontSize = "14px";
    inp.style.direction = "rtl";
    inp.style.outline = "none";
    wrap.replaceChild(inp, el);
    inp.focus();
    var done = false;
    function commit() {
      if (done) return;
      done = true;
      var val = inp.value.trim();
      if (val) {
        if (allCats().indexOf(val) === -1) customCats.push(val);
        S[tab][idx][key] = val;
      } else {
        S[tab][idx][key] = "";
      }
      render();
    }
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", function(e) { if (e.key === "Enter") inp.blur(); });
  } else {
    S[tab][idx][key] = el.value;
  }
}

// ── Field builders ──
function fld(label, type, val, tab, idx, key, ph, full) {
  var c = full ? "fd fu" : "fd";
  var h = '<div class="' + c + '">';
  h += '<label>' + label + '</label>';
  h += '<input type="' + type + '"';
  h += ' value="' + esc(val) + '"';
  h += ' placeholder="' + esc(ph) + '"';
  h += " oninput=\"upd('" + tab + "'," + idx + ",'" + key + "',this.value)\"";
  h += ' inputmode="' + (type === "number" ? "decimal" : "text") + '">';
  h += '</div>';
  return h;
}

function selCat(val, tab, idx, key) {
  var cats = allCats();
  if (val && cats.indexOf(val) === -1) cats = cats.concat([val]);
  var h = '<div class="fd"><label>קטגוריה</label>';
  h += "<select onchange=\"handleCatSelect(this,'" + tab + "'," + idx + ",'" + key + "')\">";
  h += '<option value="">בחר...</option>';
  for (var i = 0; i < cats.length; i++) {
    h += '<option value="' + esc(cats[i]) + '"';
    if (val === cats[i]) h += ' selected';
    h += '>' + esc(cats[i]) + '</option>';
  }
  h += '<option value="__new__">+ קטגוריה חדשה...</option>';
  h += '</select></div>';
  return h;
}

// ── Tab renderers ──
function rEquity() {
  var h = '<div class="cl">';
  for (var i = 0; i < S.equity.length; i++) {
    var r = S.equity[i];
    h += '<div class="cd">';
    h += '<button class="dx" onclick="delRow(\'equity\',' + i + ')">&#x2715;</button>';
    h += '<div class="cr">' + fld("שם","text",r.name,"equity",i,"name","שם המקור") + fld("מספר","text",r.number,"equity",i,"number","מספר חשבון") + '</div>';
    h += '<div class="cr">' + fld("ערך","number",r.value,"equity",i,"value","0") + fld("הערות","text",r.notes,"equity",i,"notes","הערות") + '</div>';
    h += '</div>';
  }
  h += '</div>';
  var t = 0; for (var i = 0; i < S.equity.length; i++) t += (parseFloat(S.equity[i].value) || 0);
  h += '<div class="tot"><span class="l">סך הכל הון עצמי</span><span class="v">' + fmt(t) + '</span></div>';
  h += '<button class="ab" onclick="addRow(\'equity\')">+ הוסף מקור</button>';
  return h;
}

function rSavings() {
  var h = '<div class="cl">';
  for (var i = 0; i < S.savings.length; i++) {
    var r = S.savings[i];
    h += '<div class="cd">';
    h += '<button class="dx" onclick="delRow(\'savings\',' + i + ')">&#x2715;</button>';
    h += '<div class="cr">' + fld("שם","text",r.name,"savings",i,"name","שם החיסכון") + fld("מספר","text",r.number,"savings",i,"number","מספר") + '</div>';
    h += '<div class="cr">' + fld("ערך","number",r.value,"savings",i,"value","0") + fld("יעד","text",r.target,"savings",i,"target","יעד") + '</div>';
    h += '<div class="cr">' + fld("הערות","text",r.notes,"savings",i,"notes","הערות",true) + '</div>';
    h += '</div>';
  }
  h += '</div>';
  var t = 0; for (var i = 0; i < S.savings.length; i++) t += (parseFloat(S.savings[i].value) || 0);
  h += '<div class="tot"><span class="l">סך חסכונות יעודיים</span><span class="v">' + fmt(t) + '</span></div>';
  h += '<button class="ab" onclick="addRow(\'savings\')">+ הוסף חיסכון</button>';
  return h;
}

function rPlanned() {
  var h = '<div class="cl">';
  for (var i = 0; i < S.planned.length; i++) {
    var r = S.planned[i];
    h += '<div class="cd">';
    h += '<button class="dx" onclick="delRow(\'planned\',' + i + ')">&#x2715;</button>';
    h += '<div class="cr">' + fld("הוצאה","text",r.expense,"planned",i,"expense","שם ההוצאה") + fld("סכום","number",r.amount,"planned",i,"amount","0") + '</div>';
    h += '<div class="cr">' + selCat(r.category,"planned",i,"category") + fld("הערות","text",r.notes,"planned",i,"notes","הערות") + '</div>';
    h += '</div>';
  }
  h += '</div>';
  var total = 0; for (var i = 0; i < S.planned.length; i++) total += (parseFloat(S.planned[i].amount) || 0);
  h += '<div class="tot"><span class="l">סך הוצאות מתוכננות</span><span class="v">' + fmt(total) + '</span></div>';
  h += '<button class="ab" onclick="addRow(\'planned\')">+ הוסף הוצאה</button>';

  var cats = {};
  for (var i = 0; i < S.planned.length; i++) {
    var r = S.planned[i];
    if (r.category && r.amount) cats[r.category] = (cats[r.category] || 0) + (parseFloat(r.amount) || 0);
  }
  var ck = [];
  for (var k in cats) { if (cats.hasOwnProperty(k)) ck.push(k); }
  if (ck.length > 0) {
    ck.sort(function(a, b) { return cats[b] - cats[a]; });
    h += '<div class="cs"><h3>סיכום לפי קטגוריות</h3><div class="cg">';
    for (var i = 0; i < ck.length; i++) {
      var c = ck[i];
      var p = total > 0 ? (cats[c] / total * 100) : 0;
      h += '<div class="cc"><div class="n">' + esc(c) + '</div><div class="a">' + fmt(cats[c]) + '</div>';
      h += '<div class="bb"><div class="bf" style="width:' + p + '%"></div></div>';
      h += '<div class="p">' + p.toFixed(1) + '%</div></div>';
    }
    h += '</div></div>';
  }
  return h;
}

function rMonthly() {
  var h = '<div class="cl">';
  for (var i = 0; i < S.monthly.length; i++) {
    var r = S.monthly[i];
    h += '<div class="cd">';
    h += '<button class="dx" onclick="delRow(\'monthly\',' + i + ')">&#x2715;</button>';
    h += '<div class="cr">' + fld("הוצאה","text",r.expense,"monthly",i,"expense","שם ההוצאה") + fld("סכום","number",r.amount,"monthly",i,"amount","0") + '</div>';
    h += '<div class="cr">' + fld("הערות","text",r.notes,"monthly",i,"notes","הערות",true) + '</div>';
    h += '</div>';
  }
  h += '</div>';
  var t = 0; for (var i = 0; i < S.monthly.length; i++) t += (parseFloat(S.monthly[i].amount) || 0);
  h += '<div class="tot"><span class="l">סך תזרים חודשי</span><span class="v">' + fmt(t) + '</span></div>';
  h += '<button class="ab" onclick="addRow(\'monthly\')">+ הוסף הוצאה</button>';
  return h;
}

function rSummary() {
  var tE = 0, tP = 0;
  for (var i = 0; i < S.equity.length; i++) tE += (parseFloat(S.equity[i].value) || 0);
  for (var i = 0; i < S.planned.length; i++) tP += (parseFloat(S.planned[i].amount) || 0);
  var net = tE - tP;
  var clr = net >= 0 ? "#7ecba1" : "#e8927c";
  var h = '<div class="ss">';
  h += '<div class="sc"><div class="ic">\u25C6</div><div class="l">סך הון עצמי</div><div class="a" style="color:#7ecba1">' + fmt(tE) + '</div></div>';
  h += '<div class="sd"><span class="so">\u2212</span></div>';
  h += '<div class="sc"><div class="ic">\u25A4</div><div class="l">סך הוצאות מתוכננות</div><div class="a" style="color:#e8927c">' + fmt(tP) + '</div></div>';
  h += '<div class="sd"><span class="so">=</span></div>';
  h += '<div class="sc res" style="border-color:' + clr + '"><div class="ic">\u03A3</div><div class="l">סך הכל</div><div class="a" style="font-size:28px;color:' + clr + '">' + fmt(net) + '</div>';
  h += '<div class="su" style="color:' + clr + '">' + (net >= 0 ? "יתרה חיובית" : "יתרה שלילית") + '</div></div>';
  h += '</div>';
  return h;
}

// ── Main render ──
function render() {
  var t = S.tab;
  var ct = null;
  for (var i = 0; i < TABS.length; i++) { if (TABS[i].id === t) { ct = TABS[i]; break; } }
  if (!ct) ct = TABS[0];
  var h = "";

  // Header
  h += '<div class="hdr"><div class="hdr-top">';
  h += '<div class="logo">\u20AA</div>';
  h += '<div><h1>ניהול תזרים</h1><p>מעקב הון, חסכונות והוצאות</p></div>';
  h += '<div class="hdr-act">';
  h += '<button class="ib" onclick="exportExcel()" title="ייצוא">\u2B07</button>';
  h += '<label class="ib" title="ייבוא">\u2B06<input type="file" accept=".xlsx,.xls" onchange="importExcel(event)"></label>';
  h += '</div></div>';

  // Month bar
  h += '<div class="mbar"><span class="ci">\uD83D\uDCC5</span>';
  h += '<select onchange="setMonth(this.value)">';
  for (var m = 0; m < 12; m++) {
    h += '<option value="' + m + '"' + (S.month === m ? ' selected' : '') + '>' + HMON[m] + '</option>';
  }
  h += '</select>';
  h += '<input type="number" value="' + S.year + '" min="2020" max="2040" onchange="setYear(this.value)" inputmode="numeric">';
  h += '</div>';

  // Report buttons
  h += '<div class="rbar">';
  h += '<button class="rb" onclick="exportReportXl()">\uD83D\uDCCA דוח Excel</button>';
  h += '<button class="rb" onclick="exportReportHtml()">\uD83D\uDCC4 דוח HTML</button>';
  h += '</div></div>';

  // Content
  h += '<div class="cnt"><div class="sh"><span class="ic">' + ct.ic + '</span><h2>' + ct.lb + '</h2></div>';
  if (t === "equity") h += rEquity();
  else if (t === "savings") h += rSavings();
  else if (t === "planned") h += rPlanned();
  else if (t === "monthly") h += rMonthly();
  else if (t === "summary") h += rSummary();
  h += '</div>';

  // Tab bar
  h += '<div class="tbar">';
  for (var i = 0; i < TABS.length; i++) {
    var tb = TABS[i];
    h += '<button class="tb' + (t === tb.id ? ' on' : '') + '" onclick="switchTab(\'' + tb.id + '\')">';
    h += '<span class="ic">' + tb.ic + '</span>';
    h += '<span class="lb">' + tb.lb + '</span>';
    h += '</button>';
  }
  h += '</div>';

  document.getElementById("app").innerHTML = h;
}

// ── Report data ──
function reportData() {
  var tE = 0, tS = 0, tP = 0, tM = 0;
  for (var i = 0; i < S.equity.length; i++) tE += (parseFloat(S.equity[i].value) || 0);
  for (var i = 0; i < S.savings.length; i++) tS += (parseFloat(S.savings[i].value) || 0);
  for (var i = 0; i < S.planned.length; i++) tP += (parseFloat(S.planned[i].amount) || 0);
  for (var i = 0; i < S.monthly.length; i++) tM += (parseFloat(S.monthly[i].amount) || 0);
  var cats = {};
  for (var i = 0; i < S.planned.length; i++) {
    var r = S.planned[i];
    if (r.category && r.amount) cats[r.category] = (cats[r.category] || 0) + (parseFloat(r.amount) || 0);
  }
  return { label: mLabel(), tE: tE, tS: tS, tP: tP, tM: tM, net: tE - tP, cats: cats };
}

// ── Excel Export ──
function exportExcel() {
  if (typeof XLSX === "undefined") { toast("טוען ספריית אקסל..."); return; }
  var wb = XLSX.utils.book_new();
  var ml = mLabel();
  function add(name, data, cols) {
    var ws = XLSX.utils.aoa_to_sheet(data);
    ws["!cols"] = cols;
    XLSX.utils.book_append_sheet(wb, ws, name);
  }
  var d1 = [["דוח — " + ml], [""], ["שם", "מספר", "ערך", "הערות"]];
  for (var i = 0; i < S.equity.length; i++) { var r = S.equity[i]; d1.push([r.name, r.number, parseFloat(r.value) || 0, r.notes]); }
  add("הון עצמי", d1, [{wch:20},{wch:15},{wch:15},{wch:25}]);
  var d2 = [["דוח — " + ml], [""], ["שם", "מספר", "ערך", "יעד", "הערות"]];
  for (var i = 0; i < S.savings.length; i++) { var r = S.savings[i]; d2.push([r.name, r.number, parseFloat(r.value) || 0, r.target, r.notes]); }
  add("חסכונות יעודיים", d2, [{wch:20},{wch:15},{wch:15},{wch:15},{wch:25}]);
  var d3 = [["דוח — " + ml], [""], ["הוצאה", "סכום", "קטגוריה", "הערות"]];
  for (var i = 0; i < S.planned.length; i++) { var r = S.planned[i]; d3.push([r.expense, parseFloat(r.amount) || 0, r.category, r.notes]); }
  add("הוצאות מתוכננות", d3, [{wch:20},{wch:15},{wch:15},{wch:25}]);
  var d4 = [["דוח — " + ml], [""], ["הוצאה", "סכום", "הערות"]];
  for (var i = 0; i < S.monthly.length; i++) { var r = S.monthly[i]; d4.push([r.expense, parseFloat(r.amount) || 0, r.notes]); }
  add("תזרים חודשי", d4, [{wch:20},{wch:15},{wch:25}]);
  var rd = reportData();
  add("סיכום", [["דוח — " + ml], [""], ["", "סכום"], ["סך הון עצמי", rd.tE], ["סך הוצאות מתוכננות", rd.tP], ["סך הכל", rd.net]], [{wch:25},{wch:15}]);
  XLSX.writeFile(wb, "תזרים_" + HMON[S.month] + "_" + S.year + ".xlsx");
  toast("הקובץ יוצא בהצלחה");
}

// ── Excel Import ──
function importExcel(e) {
  var file = e.target.files[0]; if (!file) return;
  if (typeof XLSX === "undefined") { toast("טוען ספריית אקסל..."); return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(ev.target.result, {type: "array"});
      var nm = wb.SheetNames;
      importTab(wb, nm, ["הון עצמי"], ["שם","מספר","ערך"], "equity", function(r){return{id:uid(),name:String(r[0]||""),number:String(r[1]||""),value:String(r[2]||""),notes:String(r[3]||"")};}, mkE);
      importTab(wb, nm, ["חסכונות יעודיים","חסכונות"], ["שם","מספר","ערך"], "savings", function(r){return{id:uid(),name:String(r[0]||""),number:String(r[1]||""),value:String(r[2]||""),target:String(r[3]||""),notes:String(r[4]||"")};}, mkS);
      importTab(wb, nm, ["הוצאות מתוכננות"], ["הוצאה","סכום"], "planned", function(r){return{id:uid(),expense:String(r[0]||""),amount:String(r[1]||""),category:String(r[2]||""),notes:String(r[3]||"")};}, mkP);
      importTab(wb, nm, ["תזרים חודשי"], ["הוצאה","סכום"], "monthly", function(r){return{id:uid(),expense:String(r[0]||""),amount:String(r[1]||""),notes:String(r[2]||"")};}, mkM);
      syncCats();
      render();
      toast("הקובץ יובא בהצלחה");
    } catch (err) { toast("שגיאה בייבוא"); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = "";
}

function importTab(wb, names, kw, hdr, key, mapFn, mkFn) {
  var ws = findSheet(wb, names, kw); if (!ws) return;
  var rows = XLSX.utils.sheet_to_json(ws, {header: 1});
  var sr = findHdr(rows, hdr); if (sr < 0) return;
  S[key] = [];
  for (var i = sr + 1; i < rows.length; i++) {
    var r = rows[i];
    if (!r || (!r[0] && !r[1])) continue;
    S[key].push(mapFn(r));
  }
  if (!S[key].length) S[key].push(mkFn());
}
function findSheet(wb, names, kw) {
  for (var n = 0; n < names.length; n++)
    for (var k = 0; k < kw.length; k++)
      if (names[n].indexOf(kw[k]) !== -1) return wb.Sheets[names[n]];
  return null;
}
function findHdr(rows, hdr) {
  for (var i = 0; i < rows.length; i++) {
    if (!rows[i]) continue;
    var ok = true;
    for (var k = 0; k < hdr.length; k++) { if (String(rows[i][k] || "") !== hdr[k]) { ok = false; break; } }
    if (ok) return i;
  }
  return 0;
}
function syncCats() {
  for (var i = 0; i < S.planned.length; i++) {
    var c = S.planned[i].category;
    if (c && BASE_CATS.indexOf(c) === -1 && customCats.indexOf(c) === -1) customCats.push(c);
  }
}

// ── Monthly report Excel ──
function exportReportXl() {
  if (typeof XLSX === "undefined") { toast("טוען ספריית אקסל..."); return; }
  var rd = reportData(), wb = XLSX.utils.book_new(), d = [];
  d.push(["דוח חודשי — " + rd.label], [""]);
  d.push(["סיכום"], ["סך הון עצמי", rd.tE], ["סך חסכונות", rd.tS], ["סך הוצאות מתוכננות", rd.tP], ["סך תזרים חודשי", rd.tM], ["יתרה", rd.net], [""]);
  d.push(["הון עצמי"], ["שם", "מספר", "ערך", "הערות"]);
  for (var i = 0; i < S.equity.length; i++) { var r = S.equity[i]; if (r.name || r.value) d.push([r.name, r.number, parseFloat(r.value) || 0, r.notes]); }
  d.push([""]);
  d.push(["חסכונות יעודיים"], ["שם", "מספר", "ערך", "יעד", "הערות"]);
  for (var i = 0; i < S.savings.length; i++) { var r = S.savings[i]; if (r.name || r.value) d.push([r.name, r.number, parseFloat(r.value) || 0, r.target, r.notes]); }
  d.push([""]);
  d.push(["הוצאות מתוכננות"], ["הוצאה", "סכום", "קטגוריה", "הערות"]);
  for (var i = 0; i < S.planned.length; i++) { var r = S.planned[i]; if (r.expense || r.amount) d.push([r.expense, parseFloat(r.amount) || 0, r.category, r.notes]); }
  d.push([""]);
  d.push(["תזרים חודשי"], ["הוצאה", "סכום", "הערות"]);
  for (var i = 0; i < S.monthly.length; i++) { var r = S.monthly[i]; if (r.expense || r.amount) d.push([r.expense, parseFloat(r.amount) || 0, r.notes]); }
  var ws = XLSX.utils.aoa_to_sheet(d); ws["!cols"] = [{wch:30},{wch:15},{wch:15},{wch:15},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws, "דוח חודשי");
  XLSX.writeFile(wb, "דוח_" + HMON[S.month] + "_" + S.year + ".xlsx");
  toast("דוח Excel יוצא");
}

p.push(”<div class='sr'><span class='l'>סך חסכונות</span><span class='v' style='color:#c9a84c'>” + fmt(rd.tS) + “</span></div>”);

p.push(”<div class='sr'><span class='l'>סך תזרים חודשי</span><span class='v' style='color:#e8927c'>” + fmt(rd.tM) + “</span></div>”);

// ── Init ──
render();

} catch(e) {
var box = document.getElementById(“errbox”);
if (box) { box.style.display = “block”; box.textContent = “Init Error: “ + e.message + “ | “ + e.stack; }
