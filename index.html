<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ניהול תזרים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #131210;
  --surface: #1e1d18;
  --surface2: #26251f;
  --border: #2e2d28;
  --text: #e8e6e1;
  --text2: #8a8780;
  --text3: #5a5850;
  --gold: #c9a84c;
  --gold2: #a68932;
  --green: #7ecba1;
  --red: #e8927c;
  --radius: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; 
  overflow: hidden;
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 0; height: 0; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

.app {
display: flex;
flex-direction: column;
height: 100%;
height: 100dvh;
}
.header {
flex-shrink: 0;
padding: 12px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
}
.header-top {
display: flex;
align-items: center;
gap: 12px;
}
.logo {
width: 38px; height: 38px;
border-radius: 10px;
background: linear-gradient(135deg, var(–gold), var(–gold2));
display: flex; align-items: center; justify-content: center;
font-size: 20px; font-weight: 700; color: var(–bg);
flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
.header p { font-size: 12px; color: var(–text2); }
.header-actions {
margin-right: auto;
display: flex; gap: 6px;
}
.icon-btn {
width: 36px; height: 36px;
border: 1px solid var(–border);
border-radius: 8px;
background: var(–surface2);
color: var(–text2);
font-size: 16px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: all 0.15s;
position: relative;
overflow: hidden;
}
.icon-btn:active { background: var(–border); }
.icon-btn input[type=file] {
position: absolute; inset: 0;
opacity: 0; cursor: pointer;
font-size: 0;
}

/* ── Month Bar ── */
.month-bar {
display: flex;
align-items: center;
gap: 8px;
margin-top: 10px;
padding: 8px 12px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
}
.month-bar .cal-icon {
font-size: 16px;
color: var(–gold);
flex-shrink: 0;
}
.month-bar select {
flex: 1;
padding: 6px 8px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
font-weight: 500;
direction: rtl;
outline: none;
-webkit-appearance: none;
appearance: none;
}
.month-bar select:focus { border-color: var(–gold); }
.month-bar input[type=number] {
width: 72px;
padding: 6px 8px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
font-weight: 500;
text-align: center;
outline: none;
direction: ltr;
}
.month-bar input:focus { border-color: var(–gold); }

/* ── Report Buttons ── */
.report-bar {
display: flex;
gap: 8px;
margin-top: 8px;
}
.report-btn {
flex: 1;
padding: 9px 10px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text2);
font-family: ‘Heebo’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
transition: all 0.15s;
}
.report-btn:active { background: var(–border); color: var(–text); }
.report-btn .ri { font-size: 14px; }

.content {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding: 16px 14px;
padding-bottom: 80px;
}

.tab-bar {
flex-shrink: 0;
display: flex;
background: var(–surface);
border-top: 1px solid var(–border);
padding-bottom: var(–safe-bottom);
}
.tab-btn {
flex: 1;
padding: 8px 2px 10px;
background: none;
border: none;
color: var(–text3);
font-family: ‘Heebo’, sans-serif;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
transition: color 0.2s;
position: relative;
}
.tab-btn.active { color: var(–gold); }
.tab-btn.active::before {
content: ‘’;
position: absolute;
top: 0; left: 20%; right: 20%;
height: 2px;
background: var(–gold);
border-radius: 0 0 2px 2px;
}
.tab-btn .icon { font-size: 18px; }
.tab-btn .label { font-size: 10px; font-weight: 500; }

.section-head {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 14px;
}
.section-head .ico { font-size: 18px; color: var(–gold); }
.section-head h2 { font-size: 16px; font-weight: 600; }

.card-list { display: flex; flex-direction: column; gap: 8px; }
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 12px;
position: relative;
transition: border-color 0.2s;
}
.card:focus-within { border-color: var(–gold); }
.card-row {
display: flex;
gap: 8px;
margin-bottom: 8px;
flex-wrap: wrap;
}
.card-row:last-child { margin-bottom: 0; }
.field { flex: 1; min-width: 0; }
.field.full { flex-basis: 100%; }
.field label {
display: block;
font-size: 11px;
font-weight: 500;
color: var(–text2);
margin-bottom: 4px;
}
.field input,
.field select {
width: 100%;
padding: 9px 10px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
direction: rtl;
outline: none;
transition: border-color 0.15s;
}
.field input:focus,
.field select:focus { border-color: var(–gold); }
.field input::placeholder { color: var(–text3); }
.field select { -webkit-appearance: none; appearance: none; }
.card-delete {
position: absolute;
top: 8px;
left: 8px;
width: 26px; height: 26px;
border: none;
background: none;
color: var(–text3);
font-size: 14px;
cursor: pointer;
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
}
.card-delete:active { background: var(–border); color: var(–red); }

.add-btn {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
width: 100%;
padding: 14px;
margin-top: 10px;
background: none;
border: 1.5px dashed var(–border);
border-radius: var(–radius);
color: var(–text2);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
font-weight: 500;
cursor: pointer;
}
.add-btn:active { background: var(–surface); }

.total-bar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 16px;
margin-top: 10px;
background: var(–surface2);
border-radius: var(–radius);
border: 1px solid var(–border);
}
.total-bar .lbl { font-size: 13px; font-weight: 600; color: var(–text2); }
.total-bar .val { font-size: 20px; font-weight: 700; color: var(–gold); }

.cat-section { margin-top: 24px; }
.cat-section h3 { font-size: 14px; color: var(–text2); font-weight: 600; margin-bottom: 12px; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 12px;
}
.cat-card .name { font-size: 12px; color: var(–text2); margin-bottom: 2px; }
.cat-card .amt { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.cat-card .bar-bg { height: 3px; background: var(–border); border-radius: 2px; overflow: hidden; }
.cat-card .bar-fill { height: 100%; background: linear-gradient(90deg, var(–gold), var(–gold2)); border-radius: 2px; transition: width 0.4s; }
.cat-card .pct { font-size: 11px; color: var(–text3); margin-top: 4px; text-align: left; }

.summary-stack {
display: flex;
flex-direction: column;
gap: 14px;
max-width: 400px;
margin: 0 auto;
}
.summary-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 22px 16px;
text-align: center;
}
.summary-card .ico { font-size: 22px; color: var(–gold); margin-bottom: 6px; }
.summary-card .lbl { font-size: 13px; color: var(–text2); margin-bottom: 4px; }
.summary-card .amt { font-size: 24px; font-weight: 700; }
.summary-divider { text-align: center; }
.summary-op {
display: inline-flex;
width: 32px; height: 32px;
align-items: center; justify-content: center;
border-radius: 50%;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text2);
font-size: 16px;
font-weight: 700;
}
.summary-card.result { border-width: 2px; }
.summary-card .sub { font-size: 12px; margin-top: 4px; }

.toast {
position: fixed;
bottom: 80px;
left: 50%; transform: translateX(-50%);
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text);
padding: 10px 20px;
border-radius: 10px;
font-family: ‘Heebo’, sans-serif;
font-size: 13px;
z-index: 999;
animation: toastIn 0.3s, toastOut 0.3s 1.7s forwards;
white-space: nowrap;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(10px); } }
</style>

</head>
<body>

<div class="app" id="app"></div>

<script>
var BASE_CATEGORIES = ["דיור","חינוך","בריאות","תחבורה","מזון","בילויים","ביגוד","חשבונות","ביטוח","אחר"];
var customCategories = [];
function getAllCategories(){ return BASE_CATEGORIES.concat(customCategories); }
var TABS = [
  {id:"equity",label:"הון עצמי",icon:"◆"},
  {id:"savings",label:"חסכונות",icon:"◎"},
  {id:"planned",label:"הוצאות מתוכננות",icon:"▤"},
  {id:"monthly",label:"תזרים חודשי",icon:"◷"},
  {id:"summary",label:"סיכום",icon:"Σ"}
];
var HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

var now = new Date();
var state = {
  tab: "equity",
  month: now.getMonth(),
  year: now.getFullYear(),
  equity: [mkEquity()],
  savings: [mkSavings()],
  planned: [mkPlanned()],
  monthly: [mkMonthly()]
};

function uid(){ return Math.random().toString(36).substr(2,9); }
function mkEquity(){ return {id:uid(), name:"", number:"", value:"", notes:""}; }
function mkSavings(){ return {id:uid(), name:"", number:"", value:"", target:"", notes:""}; }
function mkPlanned(){ return {id:uid(), expense:"", amount:"", category:"", notes:""}; }
function mkMonthly(){ return {id:uid(), expense:"", amount:"", notes:""}; }

function fmt(v){
  var n = parseFloat(v);
  if(isNaN(n)) return "₪0";
  return "₪" + n.toLocaleString("he-IL");
}
function getMonthLabel(){ return HEB_MONTHS[state.month] + " " + state.year; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Render ──
function render(){
  var app = document.getElementById("app");
  var t = state.tab;
  var ct = TABS.find(function(x){ return x.id === t; });
  var html = '';

  // Header
  html += '<div class="header">';
  html += '<div class="header-top">';
  html += '<div class="logo">₪</div>';
  html += '<div><h1>ניהול תזרים</h1><p>מעקב הון, חסכונות והוצאות</p></div>';
  html += '<div class="header-actions">';
  html += '<button class="icon-btn" onclick="exportExcel()" title="ייצוא לאקסל">⬇</button>';
  html += '<label class="icon-btn" title="ייבוא מאקסל">⬆<input type="file" accept=".xlsx,.xls" onchange="importExcel(event)"></label>';
  html += '</div></div>';

  // Month selector
  html += '<div class="month-bar">';
  html += '<span class="cal-icon">📅</span>';
  html += '<select onchange="setMonth(this.value)">';
  for(var m = 0; m < 12; m++){
    html += '<option value="' + m + '"' + (state.month === m ? ' selected' : '') + '>' + HEB_MONTHS[m] + '</option>';
  }
  html += '</select>';
  html += '<input type="number" value="' + state.year + '" min="2020" max="2040" onchange="setYear(this.value)" inputmode="numeric">';
  html += '</div>';

  // Report export buttons
  html += '<div class="report-bar">';
  html += '<button class="report-btn" onclick="exportMonthlyReportExcel()"><span class="ri">📊</span>דוח חודשי Excel</button>';
  html += '<button class="report-btn" onclick="exportMonthlyReportHTML()"><span class="ri">📄</span>דוח חודשי HTML</button>';
  html += '</div>';
  html += '</div>';

  // Content
  html += '<div class="content">';
  html += '<div class="section-head"><span class="ico">' + ct.icon + '</span><h2>' + ct.label + '</h2></div>';
  if(t === "equity") html += renderEquity();
  else if(t === "savings") html += renderSavings();
  else if(t === "planned") html += renderPlanned();
  else if(t === "monthly") html += renderMonthly();
  else if(t === "summary") html += renderSummary();
  html += '</div>';

  // Tab bar
  html += '<div class="tab-bar">';
  TABS.forEach(function(tb){
    html += '<button class="tab-btn' + (t===tb.id?' active':'') + '" onclick="switchTab(\'' + tb.id + '\')">';
    html += '<span class="icon">' + tb.icon + '</span>';
    html += '<span class="label">' + tb.label + '</span>';
    html += '</button>';
  });
  html += '</div>';
  app.innerHTML = html;
}

function switchTab(id){ state.tab = id; render(); }
function setMonth(v){ state.month = parseInt(v); render(); }
function setYear(v){ var y = parseInt(v); if(y >= 2020 && y <= 2040) state.year = y; }

function renderEquity(){
  var h = '<div class="card-list">';
  state.equity.forEach(function(r,i){
    h += '<div class="card"><button class="card-delete" onclick="delRow(\'equity\','+i+')">✕</button>';
    h += '<div class="card-row">' + field("שם","text",r.name,"equity",i,"name","שם המקור") + field("מספר","text",r.number,"equity",i,"number","מספר חשבון") + '</div>';
    h += '<div class="card-row">' + field("ערך","number",r.value,"equity",i,"value","0") + field("הערות","text",r.notes,"equity",i,"notes","הערות") + '</div></div>';
  });
  h += '</div>';
  var total = state.equity.reduce(function(s,r){ return s+(parseFloat(r.value)||0); },0);
  h += '<div class="total-bar"><span class="lbl">סך הכל הון עצמי</span><span class="val">'+fmt(total)+'</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'equity\')">+ הוסף מקור</button>';
  return h;
}

function renderSavings(){
  var h = '<div class="card-list">';
  state.savings.forEach(function(r,i){
    h += '<div class="card"><button class="card-delete" onclick="delRow(\'savings\','+i+')">✕</button>';
    h += '<div class="card-row">' + field("שם","text",r.name,"savings",i,"name","שם החיסכון") + field("מספר","text",r.number,"savings",i,"number","מספר") + '</div>';
    h += '<div class="card-row">' + field("ערך","number",r.value,"savings",i,"value","0") + field("יעד","text",r.target,"savings",i,"target","יעד") + '</div>';
    h += '<div class="card-row">' + field("הערות","text",r.notes,"savings",i,"notes","הערות",true) + '</div></div>';
  });
  h += '</div>';
  var total = state.savings.reduce(function(s,r){ return s+(parseFloat(r.value)||0); },0);
  h += '<div class="total-bar"><span class="lbl">סך חסכונות יעודיים</span><span class="val">'+fmt(total)+'</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'savings\')">+ הוסף חיסכון</button>';
  return h;
}

function renderPlanned(){
  var h = '<div class="card-list">';
  state.planned.forEach(function(r,i){
    h += '<div class="card"><button class="card-delete" onclick="delRow(\'planned\','+i+')">✕</button>';
    h += '<div class="card-row">' + field("הוצאה","text",r.expense,"planned",i,"expense","שם ההוצאה") + field("סכום","number",r.amount,"planned",i,"amount","0") + '</div>';
    h += '<div class="card-row">' + selectField("קטגוריה",r.category,"planned",i,"category") + field("הערות","text",r.notes,"planned",i,"notes","הערות") + '</div></div>';
  });
  h += '</div>';
  var total = state.planned.reduce(function(s,r){ return s+(parseFloat(r.amount)||0); },0);
  h += '<div class="total-bar"><span class="lbl">סך הוצאות מתוכננות</span><span class="val">'+fmt(total)+'</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'planned\')">+ הוסף הוצאה</button>';
  var cats = {};
  state.planned.forEach(function(r){ if(r.category && r.amount) cats[r.category]=(cats[r.category]||0)+(parseFloat(r.amount)||0); });
  var ck = Object.keys(cats);
  if(ck.length){
    ck.sort(function(a,b){ return cats[b]-cats[a]; });
    h += '<div class="cat-section"><h3>סיכום לפי קטגוריות</h3><div class="cat-grid">';
    ck.forEach(function(c){
      var pct = total>0?(cats[c]/total*100):0;
      h += '<div class="cat-card"><div class="name">'+c+'</div><div class="amt">'+fmt(cats[c])+'</div>';
      h += '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="pct">'+pct.toFixed(1)+'%</div></div>';
    });
    h += '</div></div>';
  }
  return h;
}

function renderMonthly(){
  var h = '<div class="card-list">';
  state.monthly.forEach(function(r,i){
    h += '<div class="card"><button class="card-delete" onclick="delRow(\'monthly\','+i+')">✕</button>';
    h += '<div class="card-row">' + field("הוצאה","text",r.expense,"monthly",i,"expense","שם ההוצאה") + field("סכום","number",r.amount,"monthly",i,"amount","0") + '</div>';
    h += '<div class="card-row">' + field("הערות","text",r.notes,"monthly",i,"notes","הערות",true) + '</div></div>';
  });
  h += '</div>';
  var total = state.monthly.reduce(function(s,r){ return s+(parseFloat(r.amount)||0); },0);
  h += '<div class="total-bar"><span class="lbl">סך תזרים חודשי</span><span class="val">'+fmt(total)+'</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'monthly\')">+ הוסף הוצאה</button>';
  return h;
}

function renderSummary(){
  var tE = state.equity.reduce(function(s,r){ return s+(parseFloat(r.value)||0); },0);
  var tP = state.planned.reduce(function(s,r){ return s+(parseFloat(r.amount)||0); },0);
  var net = tE - tP;
  var clr = net>=0?'var(--green)':'var(--red)';
  var h = '<div class="summary-stack">';
  h += '<div class="summary-card"><div class="ico">◆</div><div class="lbl">סך הון עצמי</div><div class="amt" style="color:var(--green)">'+fmt(tE)+'</div></div>';
  h += '<div class="summary-divider"><span class="summary-op">−</span></div>';
  h += '<div class="summary-card"><div class="ico">▤</div><div class="lbl">סך הוצאות מתוכננות</div><div class="amt" style="color:var(--red)">'+fmt(tP)+'</div></div>';
  h += '<div class="summary-divider"><span class="summary-op">=</span></div>';
  h += '<div class="summary-card result" style="border-color:'+clr+'"><div class="ico">Σ</div><div class="lbl">סך הכל</div><div class="amt" style="font-size:28px;color:'+clr+'">'+fmt(net)+'</div><div class="sub" style="color:'+clr+'">'+(net>=0?'יתרה חיובית':'יתרה שלילית')+'</div></div>';
  h += '</div>';
  return h;
}

// ── Field helpers ──
function field(label,type,value,tab,idx,key,ph,full){
  var cls = full?'field full':'field';
  return '<div class="'+cls+'"><label>'+label+'</label><input type="'+type+'" value="'+esc(value)+'" placeholder="'+esc(ph)+'" oninput="upd(\''+tab+'\','+idx+',\''+key+'\',this.value)" inputmode="'+(type==='number'?'decimal':'text')+'"></div>';
}
function selectField(label,value,tab,idx,key){
  var cats = getAllCategories();
  // If current value is custom and not in list, add it temporarily
  if(value && cats.indexOf(value)===-1) cats = cats.concat([value]);
  var h = '<div class="field"><label>'+label+'</label>';
  h += '<select onchange="handleCatSelect(this,\''+tab+'\','+idx+',\''+key+'\')">';
  h += '<option value="">בחר...</option>';
  cats.forEach(function(c){ h += '<option value="'+c+'"'+(value===c?' selected':'')+'>'+c+'</option>'; });
  h += '<option value="__new__">+ קטגוריה חדשה...</option>';
  h += '</select></div>';
  return h;
}
function handleCatSelect(el,tab,idx,key){
  if(el.value === '__new__'){
    // Replace select with text input
    var parent = el.parentNode;
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = 'הזן שם קטגוריה...';
    inp.style.cssText = 'width:100%;padding:9px 10px;background:var(--bg);border:1.5px solid var(--gold);border-radius:8px;color:var(--text);font-family:Heebo,sans-serif;font-size:14px;direction:rtl;outline:none;';
    parent.replaceChild(inp, el);
    inp.focus();
    inp.addEventListener('blur', function(){
      var val = inp.value.trim();
      if(val){
        // Add to custom categories if not already there
        var all = getAllCategories();
        if(all.indexOf(val)===-1) customCategories.push(val);
        state[tab][idx][key] = val;
      } else {
        state[tab][idx][key] = '';
      }
      render();
    });
    inp.addEventListener('keydown', function(e){
      if(e.key === 'Enter') inp.blur();
    });
  } else {
    state[tab][idx][key] = el.value;
  }
}

function upd(tab,idx,key,val){ state[tab][idx][key] = val; }
function addRow(tab){
  if(tab==='equity') state.equity.push(mkEquity());
  else if(tab==='savings') state.savings.push(mkSavings());
  else if(tab==='planned') state.planned.push(mkPlanned());
  else if(tab==='monthly') state.monthly.push(mkMonthly());
  render();
  setTimeout(function(){ var c=document.querySelector('.content'); if(c) c.scrollTop=c.scrollHeight; },50);
}
function delRow(tab,idx){
  if(state[tab].length<=1) return;
  state[tab].splice(idx,1);
  render();
}

function toast(msg){
  var el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },2100);
}

// ── Helper ──
function buildReportData(){
  var tE = state.equity.reduce(function(s,r){ return s+(parseFloat(r.value)||0); },0);
  var tS = state.savings.reduce(function(s,r){ return s+(parseFloat(r.value)||0); },0);
  var tP = state.planned.reduce(function(s,r){ return s+(parseFloat(r.amount)||0); },0);
  var tM = state.monthly.reduce(function(s,r){ return s+(parseFloat(r.amount)||0); },0);
  var cats = {};
  state.planned.forEach(function(r){ if(r.category&&r.amount) cats[r.category]=(cats[r.category]||0)+(parseFloat(r.amount)||0); });
  return { label:getMonthLabel(), tE:tE, tS:tS, tP:tP, tM:tM, net:tE-tP, cats:cats };
}

// ══════════════════════════
// ── Excel Import ──
// ══════════════════════════
function importExcel(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try {
      var wb = XLSX.read(ev.target.result,{type:'array'});
      var names = wb.SheetNames;

      var eqS = findSheet(wb,names,["הון עצמי","equity"]);
      if(eqS){ var rows=XLSX.utils.sheet_to_json(eqS,{header:1}); var sr=findDataStart(rows,["שם","מספר","ערך"]);
        if(sr>=0){ state.equity=[]; for(var i=sr+1;i<rows.length;i++){ var r=rows[i]; if(!r||(!r[0]&&!r[1]&&!r[2]))continue; state.equity.push({id:uid(),name:String(r[0]||''),number:String(r[1]||''),value:String(r[2]||''),notes:String(r[3]||'')}); } if(!state.equity.length) state.equity.push(mkEquity()); } }

      var svS = findSheet(wb,names,["חסכונות יעודיים","חסכונות","savings"]);
      if(svS){ var rows=XLSX.utils.sheet_to_json(svS,{header:1}); var sr=findDataStart(rows,["שם","מספר","ערך"]);
        if(sr>=0){ state.savings=[]; for(var i=sr+1;i<rows.length;i++){ var r=rows[i]; if(!r||(!r[0]&&!r[1]&&!r[2]))continue; state.savings.push({id:uid(),name:String(r[0]||''),number:String(r[1]||''),value:String(r[2]||''),target:String(r[3]||''),notes:String(r[4]||'')}); } if(!state.savings.length) state.savings.push(mkSavings()); } }

      var plS = findSheet(wb,names,["הוצאות מתוכננות","planned"]);
      if(plS){ var rows=XLSX.utils.sheet_to_json(plS,{header:1}); var sr=findDataStart(rows,["הוצאה","סכום"]);
        if(sr>=0){ state.planned=[]; for(var i=sr+1;i<rows.length;i++){ var r=rows[i]; if(!r||(!r[0]&&!r[1]))continue; state.planned.push({id:uid(),expense:String(r[0]||''),amount:String(r[1]||''),category:String(r[2]||''),notes:String(r[3]||'')}); } if(!state.planned.length) state.planned.push(mkPlanned()); } }

      var moS = findSheet(wb,names,["תזרים חודשי","monthly"]);
      if(moS){ var rows=XLSX.utils.sheet_to_json(moS,{header:1}); var sr=findDataStart(rows,["הוצאה","סכום"]);
        if(sr>=0){ state.monthly=[]; for(var i=sr+1;i<rows.length;i++){ var r=rows[i]; if(!r||(!r[0]&&!r[1]))continue; state.monthly.push({id:uid(),expense:String(r[0]||''),amount:String(r[1]||''),notes:String(r[2]||'')}); } if(!state.monthly.length) state.monthly.push(mkMonthly()); } }

      syncCustomCategories();
      render();
      toast("הקובץ יובא בהצלחה ✓");
    } catch(err){ toast("שגיאה בייבוא הקובץ"); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function syncCustomCategories(){
  var base = BASE_CATEGORIES;
  state.planned.forEach(function(r){
    if(r.category && base.indexOf(r.category)===-1 && customCategories.indexOf(r.category)===-1){
      customCategories.push(r.category);
    }
  });
}

function findSheet(wb,names,kw){
  for(var n=0;n<names.length;n++) for(var k=0;k<kw.length;k++) if(names[n].indexOf(kw[k])!==-1) return wb.Sheets[names[n]];
  return null;
}
function findDataStart(rows,hdr){
  for(var i=0;i<rows.length;i++){ if(!rows[i])continue; var ok=true;
    for(var k=0;k<hdr.length;k++) if(String(rows[i][k]||'')!==hdr[k]){ok=false;break;}
    if(ok) return i;
  } return 0;
}
