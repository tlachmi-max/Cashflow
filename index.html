<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ניהול תזרים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #131210;
  --surface: #1e1d18;
  --surface2: #26251f;
  --border: #2e2d28;
  --text: #e8e6e1;
  --text2: #8a8780;
  --text3: #5a5850;
  --gold: #c9a84c;
  --gold2: #a68932;
  --green: #7ecba1;
  --red: #e8927c;
  --radius: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; 
  overflow: hidden;
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 0; height: 0; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

/* ── Layout Shell ── */
.app {
display: flex;
flex-direction: column;
height: 100%;
height: 100dvh;
}
.header {
flex-shrink: 0;
padding: 14px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 12px;
}
.logo {
width: 38px; height: 38px;
border-radius: 10px;
background: linear-gradient(135deg, var(–gold), var(–gold2));
display: flex; align-items: center; justify-content: center;
font-size: 20px; font-weight: 700; color: var(–bg);
flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
.header p { font-size: 12px; color: var(–text2); }
.header-actions {
margin-right: auto;
display: flex; gap: 6px;
}
.icon-btn {
width: 36px; height: 36px;
border: 1px solid var(–border);
border-radius: 8px;
background: var(–surface2);
color: var(–text2);
font-size: 16px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: all 0.15s;
position: relative;
overflow: hidden;
}
.icon-btn:active { background: var(–border); }
.icon-btn input[type=file] {
position: absolute; inset: 0;
opacity: 0; cursor: pointer;
font-size: 0;
}

/* ── Scrollable Content ── */
.content {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding: 16px 14px;
padding-bottom: 80px;
}

/* ── Bottom Tab Bar ── */
.tab-bar {
flex-shrink: 0;
display: flex;
background: var(–surface);
border-top: 1px solid var(–border);
padding-bottom: var(–safe-bottom);
}
.tab-btn {
flex: 1;
padding: 8px 2px 10px;
background: none;
border: none;
color: var(–text3);
font-family: ‘Heebo’, sans-serif;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
transition: color 0.2s;
position: relative;
}
.tab-btn.active { color: var(–gold); }
.tab-btn.active::before {
content: ‘’;
position: absolute;
top: 0; left: 20%; right: 20%;
height: 2px;
background: var(–gold);
border-radius: 0 0 2px 2px;
}
.tab-btn .icon { font-size: 18px; }
.tab-btn .label { font-size: 10px; font-weight: 500; }

/* ── Section Title ── */
.section-head {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 14px;
}
.section-head .ico { font-size: 18px; color: var(–gold); }
.section-head h2 { font-size: 16px; font-weight: 600; }

/* ── Card Table (Mobile-First) ── */
.card-list { display: flex; flex-direction: column; gap: 8px; }

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 12px;
position: relative;
transition: border-color 0.2s;
}
.card:focus-within { border-color: var(–gold); }

.card-row {
display: flex;
gap: 8px;
margin-bottom: 8px;
flex-wrap: wrap;
}
.card-row:last-child { margin-bottom: 0; }

.field {
flex: 1;
min-width: 0;
}
.field.full { flex-basis: 100%; }
.field label {
display: block;
font-size: 11px;
font-weight: 500;
color: var(–text2);
margin-bottom: 4px;
}
.field input,
.field select {
width: 100%;
padding: 9px 10px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
direction: rtl;
outline: none;
transition: border-color 0.15s;
}
.field input:focus,
.field select:focus {
border-color: var(–gold);
}
.field input::placeholder { color: var(–text3); }
.field select { -webkit-appearance: none; appearance: none; }

.card-delete {
position: absolute;
top: 8px;
left: 8px;
width: 26px; height: 26px;
border: none;
background: none;
color: var(–text3);
font-size: 14px;
cursor: pointer;
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
}
.card-delete:active { background: var(–border); color: var(–red); }

/* ── Add Button ── */
.add-btn {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
width: 100%;
padding: 14px;
margin-top: 10px;
background: none;
border: 1.5px dashed var(–border);
border-radius: var(–radius);
color: var(–text2);
font-family: ‘Heebo’, sans-serif;
font-size: 14px;
font-weight: 500;
cursor: pointer;
}
.add-btn:active { background: var(–surface); }

/* ── Total Bar ── */
.total-bar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 16px;
margin-top: 10px;
background: var(–surface2);
border-radius: var(–radius);
border: 1px solid var(–border);
}
.total-bar .lbl { font-size: 13px; font-weight: 600; color: var(–text2); }
.total-bar .val { font-size: 20px; font-weight: 700; color: var(–gold); }

/* ── Category Summary ── */
.cat-section { margin-top: 24px; }
.cat-section h3 { font-size: 14px; color: var(–text2); font-weight: 600; margin-bottom: 12px; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 12px;
}
.cat-card .name { font-size: 12px; color: var(–text2); margin-bottom: 2px; }
.cat-card .amt { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.cat-card .bar-bg { height: 3px; background: var(–border); border-radius: 2px; overflow: hidden; }
.cat-card .bar-fill { height: 100%; background: linear-gradient(90deg, var(–gold), var(–gold2)); border-radius: 2px; transition: width 0.4s; }
.cat-card .pct { font-size: 11px; color: var(–text3); margin-top: 4px; text-align: left; }

/* ── Summary Tab ── */
.summary-stack {
display: flex;
flex-direction: column;
gap: 14px;
max-width: 400px;
margin: 0 auto;
}
.summary-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 22px 16px;
text-align: center;
}
.summary-card .ico { font-size: 22px; color: var(–gold); margin-bottom: 6px; }
.summary-card .lbl { font-size: 13px; color: var(–text2); margin-bottom: 4px; }
.summary-card .amt { font-size: 24px; font-weight: 700; }
.summary-divider {
text-align: center;
}
.summary-op {
display: inline-flex;
width: 32px; height: 32px;
align-items: center; justify-content: center;
border-radius: 50%;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text2);
font-size: 16px;
font-weight: 700;
}
.summary-card.result {
border-width: 2px;
}
.summary-card .sub { font-size: 12px; margin-top: 4px; }

/* ── Toast ── */
.toast {
position: fixed;
bottom: 80px;
left: 50%; transform: translateX(-50%);
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text);
padding: 10px 20px;
border-radius: 10px;
font-family: ‘Heebo’, sans-serif;
font-size: 13px;
z-index: 999;
animation: toastIn 0.3s, toastOut 0.3s 1.7s forwards;
white-space: nowrap;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(10px); } }
</style>

</head>
<body>

<div class="app" id="app"></div>

<script>
// ── State ──
const CATEGORIES = ["דיור","חינוך","בריאות","תחבורה","מזון","בילויים","ביגוד","חשבונות","ביטוח","אחר"];
const TABS = [
  {id:"equity",label:"הון עצמי",icon:"◆"},
  {id:"savings",label:"חסכונות",icon:"◎"},
  {id:"planned",label:"הוצאות מתוכננות",icon:"▤"},
  {id:"monthly",label:"תזרים חודשי",icon:"◷"},
  {id:"summary",label:"סיכום",icon:"Σ"}
];

let state = {
  tab: "equity",
  equity: [mkEquity()],
  savings: [mkSavings()],
  planned: [mkPlanned()],
  monthly: [mkMonthly()]
};

function uid(){ return Math.random().toString(36).substr(2,9); }
function mkEquity(){ return {id:uid(), name:"", number:"", value:"", notes:""}; }
function mkSavings(){ return {id:uid(), name:"", number:"", value:"", target:"", notes:""}; }
function mkPlanned(){ return {id:uid(), expense:"", amount:"", category:"", notes:""}; }
function mkMonthly(){ return {id:uid(), expense:"", amount:"", notes:""}; }

function fmt(v){
  var n = parseFloat(v);
  if(isNaN(n)) return "₪0";
  return "₪" + n.toLocaleString("he-IL");
}

// ── Render ──
function render(){
  var app = document.getElementById("app");
  var t = state.tab;
  var ct = TABS.find(function(x){ return x.id === t; });

  var html = '';

  // Header
  html += '<div class="header">';
  html += '<div class="logo">₪</div>';
  html += '<div><h1>ניהול תזרים</h1><p>מעקב הון, חסכונות והוצאות</p></div>';
  html += '<div class="header-actions">';
  html += '<button class="icon-btn" onclick="exportExcel()" title="ייצוא לאקסל">⬇</button>';
  html += '<label class="icon-btn" title="ייבוא מאקסל">⬆<input type="file" accept=".xlsx,.xls" onchange="importExcel(event)"></label>';
  html += '</div>';
  html += '</div>';

  // Content
  html += '<div class="content">';
  html += '<div class="section-head"><span class="ico">' + ct.icon + '</span><h2>' + ct.label + '</h2></div>';

  if(t === "equity") html += renderEquity();
  else if(t === "savings") html += renderSavings();
  else if(t === "planned") html += renderPlanned();
  else if(t === "monthly") html += renderMonthly();
  else if(t === "summary") html += renderSummary();

  html += '</div>';

  // Tab bar
  html += '<div class="tab-bar">';
  TABS.forEach(function(tb){
    html += '<button class="tab-btn' + (t===tb.id?' active':'') + '" onclick="switchTab(\'' + tb.id + '\')">';
    html += '<span class="icon">' + tb.icon + '</span>';
    html += '<span class="label">' + tb.label + '</span>';
    html += '</button>';
  });
  html += '</div>';

  app.innerHTML = html;
}

function switchTab(id){ state.tab = id; render(); }

// ── Equity ──
function renderEquity(){
  var h = '<div class="card-list">';
  state.equity.forEach(function(r,i){
    h += '<div class="card">';
    h += '<button class="card-delete" onclick="delRow(\'equity\','+i+')">✕</button>';
    h += '<div class="card-row">';
    h += field("שם", "text", r.name, "equity", i, "name", "שם המקור");
    h += field("מספר", "text", r.number, "equity", i, "number", "מספר חשבון");
    h += '</div>';
    h += '<div class="card-row">';
    h += field("ערך", "number", r.value, "equity", i, "value", "0");
    h += field("הערות", "text", r.notes, "equity", i, "notes", "הערות");
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';
  var total = state.equity.reduce(function(s,r){ return s + (parseFloat(r.value)||0); }, 0);
  h += '<div class="total-bar"><span class="lbl">סך הכל הון עצמי</span><span class="val">' + fmt(total) + '</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'equity\')">+ הוסף מקור</button>';
  return h;
}

// ── Savings ──
function renderSavings(){
  var h = '<div class="card-list">';
  state.savings.forEach(function(r,i){
    h += '<div class="card">';
    h += '<button class="card-delete" onclick="delRow(\'savings\','+i+')">✕</button>';
    h += '<div class="card-row">';
    h += field("שם", "text", r.name, "savings", i, "name", "שם החיסכון");
    h += field("מספר", "text", r.number, "savings", i, "number", "מספר");
    h += '</div>';
    h += '<div class="card-row">';
    h += field("ערך", "number", r.value, "savings", i, "value", "0");
    h += field("יעד", "text", r.target, "savings", i, "target", "יעד");
    h += '</div>';
    h += '<div class="card-row">';
    h += field("הערות", "text", r.notes, "savings", i, "notes", "הערות", true);
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';
  var total = state.savings.reduce(function(s,r){ return s + (parseFloat(r.value)||0); }, 0);
  h += '<div class="total-bar"><span class="lbl">סך חסכונות יעודיים</span><span class="val">' + fmt(total) + '</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'savings\')">+ הוסף חיסכון</button>';
  return h;
}

// ── Planned ──
function renderPlanned(){
  var h = '<div class="card-list">';
  state.planned.forEach(function(r,i){
    h += '<div class="card">';
    h += '<button class="card-delete" onclick="delRow(\'planned\','+i+')">✕</button>';
    h += '<div class="card-row">';
    h += field("הוצאה", "text", r.expense, "planned", i, "expense", "שם ההוצאה");
    h += field("סכום", "number", r.amount, "planned", i, "amount", "0");
    h += '</div>';
    h += '<div class="card-row">';
    h += selectField("קטגוריה", r.category, "planned", i, "category");
    h += field("הערות", "text", r.notes, "planned", i, "notes", "הערות");
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';
  var total = state.planned.reduce(function(s,r){ return s + (parseFloat(r.amount)||0); }, 0);
  h += '<div class="total-bar"><span class="lbl">סך הוצאות מתוכננות</span><span class="val">' + fmt(total) + '</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'planned\')">+ הוסף הוצאה</button>';

  // Category summary
  var cats = {};
  state.planned.forEach(function(r){
    if(r.category && r.amount){
      cats[r.category] = (cats[r.category]||0) + (parseFloat(r.amount)||0);
    }
  });
  var catKeys = Object.keys(cats);
  if(catKeys.length > 0){
    catKeys.sort(function(a,b){ return cats[b]-cats[a]; });
    h += '<div class="cat-section"><h3>סיכום לפי קטגוריות</h3><div class="cat-grid">';
    catKeys.forEach(function(c){
      var pct = total > 0 ? (cats[c]/total*100) : 0;
      h += '<div class="cat-card">';
      h += '<div class="name">' + c + '</div>';
      h += '<div class="amt">' + fmt(cats[c]) + '</div>';
      h += '<div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
      h += '<div class="pct">' + pct.toFixed(1) + '%</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }
  return h;
}

// ── Monthly ──
function renderMonthly(){
  var h = '<div class="card-list">';
  state.monthly.forEach(function(r,i){
    h += '<div class="card">';
    h += '<button class="card-delete" onclick="delRow(\'monthly\','+i+')">✕</button>';
    h += '<div class="card-row">';
    h += field("הוצאה", "text", r.expense, "monthly", i, "expense", "שם ההוצאה");
    h += field("סכום", "number", r.amount, "monthly", i, "amount", "0");
    h += '</div>';
    h += '<div class="card-row">';
    h += field("הערות", "text", r.notes, "monthly", i, "notes", "הערות", true);
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';
  var total = state.monthly.reduce(function(s,r){ return s + (parseFloat(r.amount)||0); }, 0);
  h += '<div class="total-bar"><span class="lbl">סך תזרים חודשי</span><span class="val">' + fmt(total) + '</span></div>';
  h += '<button class="add-btn" onclick="addRow(\'monthly\')">+ הוסף הוצאה</button>';
  return h;
}

// ── Summary ──
function renderSummary(){
  var tEquity = state.equity.reduce(function(s,r){ return s + (parseFloat(r.value)||0); }, 0);
  var tPlanned = state.planned.reduce(function(s,r){ return s + (parseFloat(r.amount)||0); }, 0);
  var net = tEquity - tPlanned;
  var clr = net >= 0 ? 'var(--green)' : 'var(--red)';
  var h = '<div class="summary-stack">';
  h += '<div class="summary-card"><div class="ico">◆</div><div class="lbl">סך הון עצמי</div><div class="amt" style="color:var(--green)">' + fmt(tEquity) + '</div></div>';
  h += '<div class="summary-divider"><span class="summary-op">−</span></div>';
  h += '<div class="summary-card"><div class="ico">▤</div><div class="lbl">סך הוצאות מתוכננות</div><div class="amt" style="color:var(--red)">' + fmt(tPlanned) + '</div></div>';
  h += '<div class="summary-divider"><span class="summary-op">=</span></div>';
  h += '<div class="summary-card result" style="border-color:' + clr + '"><div class="ico">Σ</div><div class="lbl">סך הכל</div><div class="amt" style="font-size:28px;color:' + clr + '">' + fmt(net) + '</div><div class="sub" style="color:' + clr + '">' + (net>=0?'יתרה חיובית':'יתרה שלילית') + '</div></div>';
  h += '</div>';
  return h;
}

// ── Field Helpers ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function field(label, type, value, tab, idx, key, ph, full){
  var cls = full ? 'field full' : 'field';
  return '<div class="' + cls + '"><label>' + label + '</label>' +
    '<input type="' + type + '" value="' + esc(value) + '" placeholder="' + esc(ph) + '" ' +
    'oninput="upd(\'' + tab + '\',' + idx + ',\'' + key + '\',this.value)" ' +
    'inputmode="' + (type==='number'?'decimal':'text') + '"></div>';
}

function selectField(label, value, tab, idx, key){
  var h = '<div class="field"><label>' + label + '</label><select onchange="upd(\'' + tab + '\',' + idx + ',\'' + key + '\',this.value)">';
  h += '<option value="">בחר...</option>';
  CATEGORIES.forEach(function(c){
    h += '<option value="' + c + '"' + (value===c?' selected':'') + '>' + c + '</option>';
  });
  h += '</select></div>';
  return h;
}

// ── Data Ops ──
function upd(tab, idx, key, val){
  state[tab][idx][key] = val;
  // Update totals only, don't re-render (keeps focus)
  updateTotals();
}

function updateTotals(){
  // Lightweight update of total bars
  var totalBars = document.querySelectorAll('.total-bar .val');
  // We just let it be — full re-render on add/delete
}

function addRow(tab){
  if(tab==='equity') state.equity.push(mkEquity());
  else if(tab==='savings') state.savings.push(mkSavings());
  else if(tab==='planned') state.planned.push(mkPlanned());
  else if(tab==='monthly') state.monthly.push(mkMonthly());
  render();
  // Scroll to bottom
  setTimeout(function(){ 
    var c = document.querySelector('.content'); 
    if(c) c.scrollTop = c.scrollHeight; 
  }, 50);
}

function delRow(tab, idx){
  if(state[tab].length <= 1) return;
  state[tab].splice(idx, 1);
  render();
}

// ── Toast ──
function toast(msg){
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2100);
}

// ── Excel Export ──
function exportExcel(){
  var wb = XLSX.utils.book_new();

  // Equity sheet
  var eqData = [["שם","מספר","ערך","הערות"]];
  state.equity.forEach(function(r){ eqData.push([r.name, r.number, parseFloat(r.value)||0, r.notes]); });
  var ws1 = XLSX.utils.aoa_to_sheet(eqData);
  ws1['!cols'] = [{wch:20},{wch:15},{wch:15},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws1, "הון עצמי");

  // Savings sheet
  var svData = [["שם","מספר","ערך","יעד","הערות"]];
  state.savings.forEach(function(r){ svData.push([r.name, r.number, parseFloat(r.value)||0, r.target, r.notes]); });
  var ws2 = XLSX.utils.aoa_to_sheet(svData);
  ws2['!cols'] = [{wch:20},{wch:15},{wch:15},{wch:15},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws2, "חסכונות יעודיים");

  // Planned sheet
  var plData = [["הוצאה","סכום","קטגוריה","הערות"]];
  state.planned.forEach(function(r){ plData.push([r.expense, parseFloat(r.amount)||0, r.category, r.notes]); });
  var ws3 = XLSX.utils.aoa_to_sheet(plData);
  ws3['!cols'] = [{wch:20},{wch:15},{wch:15},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws3, "הוצאות מתוכננות");

  // Monthly sheet
  var moData = [["הוצאה","סכום","הערות"]];
  state.monthly.forEach(function(r){ moData.push([r.expense, parseFloat(r.amount)||0, r.notes]); });
  var ws4 = XLSX.utils.aoa_to_sheet(moData);
  ws4['!cols'] = [{wch:20},{wch:15},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws4, "תזרים חודשי");

  // Summary sheet
  var tEquity = state.equity.reduce(function(s,r){ return s + (parseFloat(r.value)||0); }, 0);
  var tPlanned = state.planned.reduce(function(s,r){ return s + (parseFloat(r.amount)||0); }, 0);
  var suData = [
    ["","סכום"],
    ["סך הון עצמי", tEquity],
    ["סך הוצאות מתוכננות", tPlanned],
    ["סך הכל", tEquity - tPlanned]
  ];
  var ws5 = XLSX.utils.aoa_to_sheet(suData);
  ws5['!cols'] = [{wch:25},{wch:15}];
  XLSX.utils.book_append_sheet(wb, ws5, "סיכום");

  XLSX.writeFile(wb, "תזרים.xlsx");
  toast("הקובץ יוצא בהצלחה ✓");
}

// ── Excel Import ──
function importExcel(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try {
      var wb = XLSX.read(ev.target.result, {type:'array'});
      var names = wb.SheetNames;

      // Equity
      var eqSheet = findSheet(wb, names, ["הון עצמי","equity"]);
      if(eqSheet){
        var eqRows = XLSX.utils.sheet_to_json(eqSheet, {header:1});
        if(eqRows.length > 1){
          state.equity = [];
          for(var i=1; i<eqRows.length; i++){
            var r = eqRows[i];
            if(!r || (!r[0] && !r[1] && !r[2])) continue;
            state.equity.push({id:uid(), name:String(r[0]||''), number:String(r[1]||''), value:String(r[2]||''), notes:String(r[3]||'')});
          }
          if(!state.equity.length) state.equity.push(mkEquity());
        }
      }

      // Savings
      var svSheet = findSheet(wb, names, ["חסכונות יעודיים","חסכונות","savings"]);
      if(svSheet){
        var svRows = XLSX.utils.sheet_to_json(svSheet, {header:1});
        if(svRows.length > 1){
          state.savings = [];
          for(var i=1; i<svRows.length; i++){
            var r = svRows[i];
            if(!r || (!r[0] && !r[1] && !r[2])) continue;
            state.savings.push({id:uid(), name:String(r[0]||''), number:String(r[1]||''), value:String(r[2]||''), target:String(r[3]||''), notes:String(r[4]||'')});
          }
          if(!state.savings.length) state.savings.push(mkSavings());
        }
      }

      // Planned
      var plSheet = findSheet(wb, names, ["הוצאות מתוכננות","planned"]);
      if(plSheet){
        var plRows = XLSX.utils.sheet_to_json(plSheet, {header:1});
        if(plRows.length > 1){
          state.planned = [];
          for(var i=1; i<plRows.length; i++){
            var r = plRows[i];
            if(!r || (!r[0] && !r[1])) continue;
            state.planned.push({id:uid(), expense:String(r[0]||''), amount:String(r[1]||''), category:String(r[2]||''), notes:String(r[3]||'')});
          }
          if(!state.planned.length) state.planned.push(mkPlanned());
        }
      }

      // Monthly
      var moSheet = findSheet(wb, names, ["תזרים חודשי","monthly"]);
      if(moSheet){
        var moRows = XLSX.utils.sheet_to_json(moSheet, {header:1});
        if(moRows.length > 1){
          state.monthly = [];
          for(var i=1; i<moRows.length; i++){
            var r = moRows[i];
            if(!r || (!r[0] && !r[1])) continue;
            state.monthly.push({id:uid(), expense:String(r[0]||''), amount:String(r[1]||''), notes:String(r[2]||'')});
          }
          if(!state.monthly.length) state.monthly.push(mkMonthly());
        }
      }

      render();
      toast("הקובץ יובא בהצלחה ✓");
    } catch(err){
      toast("שגיאה בייבוא הקובץ");
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function findSheet(wb, names, keywords){
  for(var n=0; n<names.length; n++){
    for(var k=0; k<keywords.length; k++){
      if(names[n].indexOf(keywords[k]) !== -1){
        return wb.Sheets[names[n]];
      }
    }
  }
  return null;
}

// ── Init ──
render();
</script>
