<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>תזרים משפחתי</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; direction: rtl; }
.hdr { background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10; }
.hdr-row { display: flex; gap: 8px; align-items: center; }
.title-inp { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; flex: 1; text-align: center; }
.hbtn { background: #334155; border: 1px solid #475569; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; }
.tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
.tab { flex: 1; padding: 12px; text-align: center; color: #94a3b8; font-size: 14px; border: none; background: none; border-bottom: 2px solid transparent; }
.tab.on { color: #38bdf8; border-bottom-color: #38bdf8; font-weight: bold; }
.pg { padding: 15px; padding-bottom: 80px; }
.tw { background: #1e293b; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 1px solid #334155; }
table { width: 100%; border-collapse: collapse; }
th { background: #334155; color: #cbd5e1; padding: 10px; font-size: 12px; text-align: right; }
td { padding: 5px; border-bottom: 1px solid #334155; }
input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 8px; border-radius: 4px; width: 100%; font-size: 14px; }
.addbtn { width: 100%; padding: 15px; background: #1e293b; border: 1px dashed #475569; color: #94a3b8; border-radius: 10px; margin-top: 10px; }
.sc { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #334155; }
.sc-val { font-size: 24px; font-weight: bold; font-family: monospace; margin-top: 5px; }
.delbtn { color: #ef4444; background: none; border: none; font-size: 18px; padding: 5px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
var KEY = 'family_cashflow_v1';
var state = { title: 'תזרים משפחתי', funds: [], goals: [], expenses: [], tab: 'funds' };

// טעינה בטוחה
try {
    var saved = localStorage.getItem(KEY);
    if (saved) {
        var parsed = JSON.parse(saved);
        if (parsed) state = parsed;
    }
} catch (e) { console.error("Load error", e); }

function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
}

function render() {
    var app = document.getElementById('app');
    app.innerHTML = '';

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'hdr';
    hdr.innerHTML = '<div class="hdr-row">' +
        '<input type="text" class="title-inp" id="titleMain" value="' + state.title + '">' +
        '<button class="hbtn" onclick="exportXLSX()">אקסל</button>' +
        '<button class="hbtn" onclick="saveHTML()">שמור קובץ</button>' +
    '</div>';
    app.appendChild(hdr);
    document.getElementById('titleMain').oninput = function(e) { state.title = e.target.value; save(); };

    // Tabs
    var tabs = document.createElement('div');
    tabs.className = 'tabs';
    var items = [['funds','🏦 קרנות'], ['goals','🎯 יעדים'], ['expenses','💸 הוצאות'], ['summary','📊 סיכום']];
    items.forEach(function(item) {
        var b = document.createElement('button');
        b.className = 'tab' + (state.tab === item[0] ? ' on' : '');
        b.innerText = item[1];
        b.onclick = function() { state.tab = item[0]; render(); };
        tabs.appendChild(b);
    });
    app.appendChild(tabs);

    var pg = document.createElement('div');
    pg.className = 'pg';
    
    if (state.tab === 'funds') renderFunds(pg);
    if (state.tab === 'goals') renderGoals(pg);
    if (state.tab === 'expenses') renderExpenses(pg);
    if (state.tab === 'summary') renderSummary(pg);

    app.appendChild(pg);
}

function renderFunds(p) {
    var html = '<div class="tw"><table><tr><th>שם</th><th>סכום</th><th>סוג</th><th></th></tr>';
    state.funds.forEach(function(f, i) {
        html += '<tr>' +
            '<td><input type="text" value="'+f.name+'" oninput="state.funds['+i+'].name=this.value;save()"></td>' +
            '<td><input type="number" value="'+f.amt+'" oninput="state.funds['+i+'].amt=this.value;save()"></td>' +
            '<td><select onchange="state.funds['+i+'].type=this.value;save()">' +
                '<option value="klali" '+(f.type=='klali'?'selected':'')+'>כללי</option>' +
                '<option value="shanati" '+(f.type=='shanati'?'selected':'')+'>שנתי</option>' +
            '</select></td>' +
            '<td><button class="delbtn" onclick="state.funds.splice('+i+',1);save();render()">✕</button></td>' +
        '</tr>';
    });
    html += '</table></div><button class="addbtn" onclick="addFund()">+ הוסף קרן</button>';
    p.innerHTML = html;
}

function addFund() {
    state.funds.push({ name: '', amt: 0, type: 'klali', id: Date.now() });
    save(); render();
}

function renderGoals(p) {
    var html = '<div class="tw"><table><tr><th>יעד/קטגוריה</th><th>תקציב</th><th></th></tr>';
    state.goals.forEach(function(g, i) {
        html += '<tr>' +
            '<td><input type="text" value="'+g.name+'" oninput="state.goals['+i+'].name=this.value;save()"></td>' +
            '<td><input type="number" value="'+g.amt+'" oninput="state.goals['+i+'].amt=this.value;save()"></td>' +
            '<td><button class="delbtn" onclick="state.goals.splice('+i+',1);save();render()">✕</button></td>' +
        '</tr>';
    });
    html += '</table></div><button class="addbtn" onclick="addGoal()">+ הוסף יעד</button>';
    p.innerHTML = html;
}

function addGoal() {
    state.goals.push({ name: '', amt: 0 });
    save(); render();
}

function renderExpenses(p) {
    var html = '<div class="tw"><table><tr><th>מטרה</th><th>סכום</th><th>קטגוריה</th><th></th></tr>';
    state.expenses.forEach(function(e, i) {
        var opts = '<option value="">ללא</option>';
        state.goals.forEach(function(g) { opts += '<option value="'+g.name+'" '+(e.cat==g.name?'selected':'')+'>'+g.name+'</option>'; });
        
        html += '<tr>' +
            '<td><input type="text" value="'+e.desc+'" oninput="state.expenses['+i+'].desc=this.value;save()"></td>' +
            '<td><input type="number" value="'+e.amt+'" oninput="state.expenses['+i+'].amt=this.value;save()"></td>' +
            '<td><select onchange="state.expenses['+i+'].cat=this.value;save()">'+opts+'</select></td>' +
            '<td><button class="delbtn" onclick="state.expenses.splice('+i+',1);save();render()">✕</button></td>' +
        '</tr>';
    });
    html += '</table></div><button class="addbtn" onclick="addExp()">+ הוסף הוצאה</button>';
    p.innerHTML = html;
}

function addExp() {
    state.expenses.push({ desc: '', amt: 0, cat: '' });
    save(); render();
}

function renderSummary(p) {
    var totalFunds = 0;
    state.funds.forEach(function(f) { totalFunds += parseFloat(f.amt || 0); });
    var totalGoals = 0;
    state.goals.forEach(function(g) { totalGoals += parseFloat(g.amt || 0); });
    var totalExp = 0;
    state.expenses.forEach(function(e) { totalExp += parseFloat(e.amt || 0); });

    var html = '<div class="sc"><div style="color:#94a3b8">סה"כ הון (קרנות)</div><div class="sc-val" style="color:#4ade80">₪' + totalFunds.toLocaleString() + '</div></div>';
    html += '<div class="sc"><div style="color:#94a3b8">סה"כ יעדים מוגדרים</div><div class="sc-val" style="color:#fb923c">₪' + totalGoals.toLocaleString() + '</div></div>';
    html += '<div class="sc"><div style="color:#94a3b8">הוצאות החודש</div><div class="sc-val" style="color:#f87171">₪' + totalExp.toLocaleString() + '</div></div>';
    p.innerHTML = html;
}

function exportXLSX() {
    var wb = XLSX.utils.book_new();
    var ws1 = XLSX.utils.json_to_sheet(state.funds);
    XLSX.utils.book_append_sheet(wb, ws1, "קרנות");
    XLSX.writeFile(wb, state.title + ".xlsx");
}

function saveHTML() {
    var currentContent = document.documentElement.outerHTML;
    var blob = new Blob([currentContent], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = state.title + ".html";
    a.click();
}

// הפעלה ראשונה
render();
</script>
</body>
</html>
