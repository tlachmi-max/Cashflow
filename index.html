<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ניהול תזרים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#131210;--s1:#1e1d18;--s2:#26251f;--bd:#2e2d28;--t1:#e8e6e1;--t2:#8a8780;--t3:#5a5850;--gold:#c9a84c;--gold2:#a68932;--grn:#7ecba1;--red:#e8927c;--r:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t1);direction:rtl;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

#app{display:flex;flex-direction:column;height:100vh}
.hdr{flex-shrink:0;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd)}
.hdr-top{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--bg);flex-shrink:0}
.hdr h1{font-size:17px;font-weight:700;line-height:1.2}
.hdr p{font-size:12px;color:var(--t2)}
.hdr-act{margin-right:auto;display:flex;gap:6px}
.ib{width:36px;height:36px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);color:var(--t2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.ib:active{background:var(--bd)}
.ib input[type=file]{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;cursor:pointer;font-size:0}
.mbar{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:10px}
.mbar .ci{font-size:16px;color:var(--gold);flex-shrink:0}
.mbar select{flex:1;padding:6px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;direction:rtl;outline:none;appearance:none}
.mbar select:focus{border-color:var(--gold)}
.mbar input[type=number]{width:72px;padding:6px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;text-align:center;outline:none;direction:ltr}
.mbar input:focus{border-color:var(--gold)}
.rbar{display:flex;gap:8px;margin-top:8px}
.rb{flex:1;padding:9px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t2);font-family:'Heebo',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.rb:active{background:var(--bd);color:var(--t1)}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px 80px}
.tbar{flex-shrink:0;display:flex;background:var(--s1);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom,0px)}
.tb{flex:1;padding:8px 2px 10px;background:none;border:none;color:var(--t3);font-family:'Heebo',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.tb.on{color:var(--gold)}
.tb.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
.tb .ic{font-size:18px}
.tb .lb{font-size:10px;font-weight:500}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sh .ic{font-size:18px;color:var(--gold)}
.sh h2{font-size:16px;font-weight:600}
.cl{display:flex;flex-direction:column;gap:8px}
.cd{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;position:relative}
.cd:focus-within{border-color:var(--gold)}
.cr{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cr:last-child{margin-bottom:0}
.fd{flex:1;min-width:0}
.fd.fu{flex-basis:100%}
.fd label{display:block;font-size:11px;font-weight:500;color:var(--t2);margin-bottom:4px}
.fd input,.fd select{width:100%;padding:9px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-family:'Heebo',sans-serif;font-size:14px;direction:rtl;outline:none}
.fd input:focus,.fd select:focus{border-color:var(--gold)}
.fd input::placeholder{color:var(--t3)}
.fd select{appearance:none}
.dx{position:absolute;top:8px;left:8px;width:26px;height:26px;border:none;background:none;color:var(--t3);font-size:14px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.dx:active{background:var(--bd);color:var(--red)}
.ab{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;margin-top:10px;background:none;border:1.5px dashed var(--bd);border-radius:var(--r);color:var(--t2);font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.ab:active{background:var(--s1)}
.tot{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;margin-top:10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--bd)}
.tot .l{font-size:13px;font-weight:600;color:var(--t2)}
.tot .v{font-size:20px;font-weight:700;color:var(--gold)}
.cs{margin-top:24px}
.cs h3{font-size:14px;color:var(--t2);font-weight:600;margin-bottom:12px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px}
.cc .n{font-size:12px;color:var(--t2);margin-bottom:2px}
.cc .a{font-size:16px;font-weight:600;margin-bottom:8px}
.cc .bb{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.cc .bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px}
.cc .p{font-size:11px;color:var(--t3);margin-top:4px;text-align:left}
.ss{display:flex;flex-direction:column;gap:14px;max-width:400px;margin:0 auto}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px 16px;text-align:center}
.sc .ic{font-size:22px;color:var(--gold);margin-bottom:6px}
.sc .l{font-size:13px;color:var(--t2);margin-bottom:4px}
.sc .a{font-size:24px;font-weight:700}
.sd{text-align:center}
.so{display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;border-radius:50%;background:var(--s2);border:1px solid var(--bd);color:var(--t2);font-size:16px;font-weight:700}
.sc.res{border-width:2px}
.sc .su{font-size:12px;margin-top:4px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:10px 20px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;z-index:999;animation:ti .3s,to .3s 1.7s forwards;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
#errbox{position:fixed;top:40px;left:10px;right:10px;background:#c00;color:#fff;padding:12px;border-radius:8px;font-size:13px;z-index:9999;display:none;direction:ltr;word-break:break-all}
</style>
</head>
<body>
<div id="app"></div>
<div id="errbox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
window.onerror = function(msg, url, line, col, err) {
  var box = document.getElementById("errbox");
  if (box) { box.style.display = "block"; box.textContent = "Error: " + msg + " (line " + line + ")"; }
};

var BASE_CATS = ["דיור","חינוך","בריאות","תחבורה","מזון","בילויים","ביגוד","חשבונות","ביטוח"];
var customCats = [];
function allCats() { return BASE_CATS.concat(customCats); }

var TABS = [
  {id:"equity", lb:"הון עצמי", ic:"◆"},
  {id:"savings", lb:"חסכונות", ic:"◎"},
  {id:"planned", lb:"הוצאות מתוכננות", ic:"▤"},
  {id:"monthly", lb:"תזרים חודשי", ic:"◸"},
  {id:"summary", lb:"סיכום", ic:"Σ"}
];
var HMON = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

var _uid = 0;
function uid() { _uid++; return "r" + _uid + "_" + Date.now(); }
function mkE() { return {id:uid(), name:"", number:"", value:"", notes:""}; }
function mkS() { return {id:uid(), name:"", number:"", value:"", target:"", notes:""}; }
function mkP() { return {id:uid(), expense:"", amount:"", category:"", notes:""}; }
function mkM() { return {id:uid(), expense:"", amount:"", notes:""}; }

var _now = new Date();
var S = {
  tab: "equity",
  month: _now.getMonth(),
  year: _now.getFullYear(),
  equity: [mkE()],
  savings: [mkS()],
  planned: [mkP()],
  monthly: [mkM()]
};

function fmt(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return "₪0";
  return "₪" + n.toLocaleString("he-IL");
}
function mLabel() { return HMON[S.month] + " " + S.year; }
function esc(s) {
  var str = String(s == null ? "" : s);
  return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function toast(msg) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 2100);
}

function switchTab(id) { S.tab = id; render(); }
function setMonth(v) { S.month = parseInt(v, 10); render(); }
function setYear(v) { var y = parseInt(v, 10); if (y >= 2020 && y <= 2040) S.year = y; }
function upd(t, i, k, v) { S[t][i][k] = v; }

function addRow(t) {
  if (t === "equity") S.equity.push(mkE());
  else if (t === "savings") S.savings.push(mkS());
  else if (t === "planned") S.planned.push(mkP());
  else if (t === "monthly") S.monthly.push(mkM());
  render();
}
function delRow(t, i) {
  if (S[t].length <= 1) return;
  S[t].splice(i, 1);
  render();
}

function handleCatSelect(el, tab, idx, key) {
  if (el.value === "__new__") {
    var val = prompt("הזן שם קטגוריה חדשה:");
    if (val && val.trim()) {
      val = val.trim();
      if (allCats().indexOf(val) === -1) customCats.push(val);
      S[tab][idx][key] = val;
    }
    render();
  } else {
    S[tab][idx][key] = el.value;
  }
}

function fld(label, type, val, tab, idx, key, ph, full) {
  var c = full ? "fd fu" : "fd";
  return '<div class="' + c + '"><label>' + label + '</label><input type="' + type + '" value="' + esc(val) + '" placeholder="' + esc(ph) + '" oninput="upd(\'' + tab + '\',' + idx + ',\'' + key + '\',this.value)" inputmode="' + (type === "number" ? "decimal" : "text") + '"></div>';
}

function selCat(val, tab, idx, key) {
  var cats = allCats();
  var h = '<div class="fd"><label>קטגוריה</label><select onchange="handleCatSelect(this,\'' + tab + '\',' + idx + ',\'' + key + '\')"><option value="">בחר...</option>';
  for (var i = 0; i < cats.length; i++) h += '<option value="' + esc(cats[i]) + '"' + (val === cats[i] ? ' selected' : '') + '>' + esc(cats[i]) + '</option>';
  h += '<option value="__new__">+ קטגוריה חדשה...</option></select></div>';
  return h;
}

function rEquity() {
  var h = '<div class="cl">', t = 0;
  for (var i = 0; i < S.equity.length; i++) {
    var r = S.equity[i]; t += (parseFloat(r.value) || 0);
    h += '<div class="cd"><button class="dx" onclick="delRow(\'equity\',' + i + ')">✕</button><div class="cr">' + fld("שם","text",r.name,"equity",i,"name","שם המקור") + fld("מספר","text",r.number,"equity",i,"number","מספר חשבון") + '</div><div class="cr">' + fld("ערך","number",r.value,"equity",i,"value","0") + fld("הערות","text",r.notes,"equity",i,"notes","הערות") + '</div></div>';
  }
  return h + '</div><div class="tot"><span class="l">סך הכל הון עצמי</span><span class="v">' + fmt(t) + '</span></div><button class="ab" onclick="addRow(\'equity\')">+ הוסף מקור</button>';
}

function rSavings() {
  var h = '<div class="cl">', t = 0;
  for (var i = 0; i < S.savings.length; i++) {
    var r = S.savings[i]; t += (parseFloat(r.value) || 0);
    h += '<div class="cd"><button class="dx" onclick="delRow(\'savings\',' + i + ')">✕</button><div class="cr">' + fld("שם","text",r.name,"savings",i,"name","שם החיסכון") + fld("מספר","text",r.number,"savings",i,"number","מספר") + '</div><div class="cr">' + fld("ערך","number",r.value,"savings",i,"value","0") + fld("יעד","text",r.target,"savings",i,"target","יעד") + '</div><div class="cr">' + fld("הערות","text",r.notes,"savings",i,"notes","הערות",true) + '</div></div>';
  }
  return h + '</div><div class="tot"><span class="l">סך חסכונות יעודיים</span><span class="v">' + fmt(t) + '</span></div><button class="ab" onclick="addRow(\'savings\')">+ הוסף חיסכון</button>';
}

function rPlanned() {
  var h = '<div class="cl">', total = 0, cats = {};
  for (var i = 0; i < S.planned.length; i++) {
    var r = S.planned[i]; var val = (parseFloat(r.amount) || 0); total += val;
    if (r.category && val) cats[r.category] = (cats[r.category] || 0) + val;
    h += '<div class="cd"><button class="dx" onclick="delRow(\'planned\',' + i + ')">✕</button><div class="cr">' + fld("הוצאה","text",r.expense,"planned",i,"expense","שם ההוצאה") + fld("סכום","number",r.amount,"planned",i,"amount","0") + '</div><div class="cr">' + selCat(r.category,"planned",i,"category") + fld("הערות","text",r.notes,"planned",i,"notes","הערות") + '</div></div>';
  }
  h += '</div><div class="tot"><span class="l">סך הוצאות מתוכננות</span><span class="v">' + fmt(total) + '</span></div><button class="ab" onclick="addRow(\'planned\')">+ הוסף הוצאה</button>';
  var ck = Object.keys(cats).sort((a,b) => cats[b] - cats[a]);
  if (ck.length) {
    h += '<div class="cs"><h3>סיכום לפי קטגוריות</h3><div class="cg">';
    for (var c of ck) {
      var p = total > 0 ? (cats[c] / total * 100) : 0;
      h += '<div class="cc"><div class="n">' + esc(c) + '</div><div class="a">' + fmt(cats[c]) + '</div><div class="bb"><div class="bf" style="width:' + p + '%"></div></div><div class="p">' + p.toFixed(1) + '%</div></div>';
    }
    h += '</div></div>';
  }
  return h;
}

function rMonthly() {
  var h = '<div class="cl">', t = 0;
  for (var i = 0; i < S.monthly.length; i++) {
    var r = S.monthly[i]; t += (parseFloat(r.amount) || 0);
    h += '<div class="cd"><button class="dx" onclick="delRow(\'monthly\',' + i + ')">✕</button><div class="cr">' + fld("הוצאה","text",r.expense,"monthly",i,"expense","שם ההוצאה") + fld("סכום","number",r.amount,"monthly",i,"amount","0") + '</div><div class="cr">' + fld("הערות","text",r.notes,"monthly",i,"notes","הערות",true) + '</div></div>';
  }
  return h + '</div><div class="tot"><span class="l">סך תזרים חודשי</span><span class="v">' + fmt(t) + '</span></div><button class="ab" onclick="addRow(\'monthly\')">+ הוסף הוצאה</button>';
}

function rSummary() {
  var tE = S.equity.reduce((a,b) => a + (parseFloat(b.value)||0), 0);
  var tP = S.planned.reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  var net = tE - tP, clr = net >= 0 ? "#7ecba1" : "#e8927c";
  return '<div class="ss"><div class="sc"><div class="ic">◆</div><div class="l">סך הון עצמי</div><div class="a" style="color:#7ecba1">' + fmt(tE) + '</div></div><div class="sd"><span class="so">−</span></div><div class="sc"><div class="ic">▤</div><div class="l">סך הוצאות מתוכננות</div><div class="a" style="color:#e8927c">' + fmt(tP) + '</div></div><div class="sd"><span class="so">=</span></div><div class="sc res" style="border-color:' + clr + '"><div class="ic">Σ</div><div class="l">סך הכל</div><div class="a" style="font-size:28px;color:' + clr + '">' + fmt(net) + '</div><div class="su" style="color:' + clr + '">' + (net >= 0 ? "יתרה חיובית" : "יתרה שלילית") + '</div></div></div>';
}

function render() {
  var ct = TABS.find(t => t.id === S.tab) || TABS[0];
  var h = '<div class="hdr"><div class="hdr-top"><div class="logo">₪</div><div><h1>ניהול תזרים</h1><p>מעקב הון, חסכונות והוצאות</p></div><div class="hdr-act"><button class="ib" onclick="exportExcel()" title="ייצוא">⬇</button><label class="ib" title="ייבוא">⬆<input type="file" accept=".xlsx,.xls" onchange="importExcel(event)"></label></div></div><div class="mbar"><span class="ci">📅</span><select onchange="setMonth(this.value)">';
  for (var m = 0; m < 12; m++) h += '<option value="' + m + '"' + (S.month === m ? ' selected' : '') + '>' + HMON[m] + '</option>';
  h += '</select><input type="number" value="' + S.year + '" min="2020" max="2040" onchange="setYear(this.value)" inputmode="numeric"></div><div class="rbar"><button class="rb" onclick="exportExcel()">📊 דוח Excel</button><button class="rb" onclick="exportReportHtml()">📄 דוח HTML</button></div></div>';
  h += '<div class="cnt"><div class="sh"><span class="ic">' + ct.ic + '</span><h2>' + ct.lb + '</h2></div>';
  if (S.tab === "equity") h += rEquity();
  else if (S.tab === "savings") h += rSavings();
  else if (S.tab === "planned") h += rPlanned();
  else if (S.tab === "monthly") h += rMonthly();
  else h += rSummary();
  h += '</div><div class="tbar">';
  for (var tb of TABS) h += '<button class="tb' + (S.tab === tb.id ? ' on' : '') + '" onclick="switchTab(\'' + tb.id + '\')"><span class="ic">' + tb.ic + '</span><span class="lb">' + tb.lb + '</span></button>';
  document.getElementById("app").innerHTML = h + '</div>';
}

function exportExcel() {
  var wb = XLSX.utils.book_new();
  var add = (n, d) => XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(d), n);
  add("הון עצמי", [["שם","מספר","ערך","הערות"], ...S.equity.map(r => [r.name, r.number, parseFloat(r.value)||0, r.notes])]);
  add("חסכונות", [["שם","מספר","ערך","יעד","הערות"], ...S.savings.map(r => [r.name, r.number, parseFloat(r.value)||0, r.target, r.notes])]);
  add("הוצאות", [["הוצאה","סכום","קטגוריה","הערות"], ...S.planned.map(r => [r.expense, parseFloat(r.amount)||0, r.category, r.notes])]);
  XLSX.writeFile(wb, "תזרים_" + mLabel() + ".xlsx");
  toast("הקובץ יוצא בהצלחה");
}

function importExcel(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(ev.target.result, {type: "array"});
      toast("הקובץ נטען"); render();
    } catch (err) { toast("שגיאה בייבוא"); }
  };
  reader.readAsArrayBuffer(file);
}

function exportReportHtml() {
  var tE = S.equity.reduce((a,b) => a + (parseFloat(b.value)||0), 0);
  var tP = S.planned.reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  var net = tE - tP, clr = net >= 0 ? "#7ecba1" : "#e8927c";

  var p = ["<!DOCTYPE html><html lang='he' dir='rtl'><head><meta charset='UTF-8'><title>דוח " + mLabel() + "</title>"];
  p.push("<style>body{font-family:'Heebo',sans-serif;background:#131210;color:#e8e6e1;padding:20px;direction:rtl}h1{color:#c9a84c}.sec{margin-bottom:24px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #2e2d28;text-align:right}</style></head><body>");
