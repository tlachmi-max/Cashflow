<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>תזרים משפחתי</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f172a; --sf:#1e293b; --sl:#293548; --bdr:#334155;
  --ac:#38bdf8; --gn:#4ade80; --rd:#f87171; --or:#fb923c; --pu:#c084fc;
  --tx:#e2e8f0; --dm:#94a3b8; --mt:#64748b; --wh:#f8fafc;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--tx); font-family:-apple-system, system-ui, sans-serif; direction:rtl; min-height:100vh; }
.hdr { background:var(--sf); border-bottom:1px solid var(--bdr); padding:10px 14px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
.tabs { display:flex; background:var(--bg); border-bottom:1px solid var(--bdr); position:sticky; top:56px; z-index:90; }
.tab { flex:1; padding:12px; border:none; background:transparent; color:var(--mt); font-size:12px; cursor:pointer; text-align:center; border-bottom:2px solid transparent; }
.tab.on { color:var(--ac); border-bottom-color:var(--ac); font-weight:700; }
.pg { padding:12px; padding-bottom:100px; }
.card { background:var(--sf); border:1px solid var(--bdr); border-radius:12px; padding:15px; margin-bottom:10px; }
.ni2, .si2 { background:var(--bg); border:1px solid var(--bdr); color:var(--tx); padding:8px; border-radius:8px; width:100%; font-size:16px; margin-top:5px; }
label { font-size:11px; color:var(--dm); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// שימוש במרכאות תקניות בלבד
var KEY = 'cf5_final';
var TAB = 'summary';
var S;

function defState() {
    return { 
        title: 'תזרים חדש', 
        funds: [], 
        goals: [], 
        expenses: [],
        profile: { gender: 'male', age: 30 } 
    };
}

// טעינת נתונים
try {
    var r = localStorage.getItem(KEY);
    S = r ? JSON.parse(r) : defState();
    if(!S.profile) S.profile = { gender: 'male', age: 30 };
} catch(e) { S = defState(); }

function save() {
    localStorage.setItem(KEY, JSON.stringify(S));
}

function render() {
    var app = document.getElementById('app');
    app.innerHTML = '';

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'hdr';
    hdr.innerHTML = `<div style="color:var(--wh); font-weight:bold; flex:1">התזרים שלי</div>
                     <button onclick="location.reload()" style="background:none; border:none; color:var(--ac)">🔄</button>`;
    app.appendChild(hdr);

    // Tabs
    var tabBar = document.createElement('div');
    tabBar.className = 'tabs';
    [['summary','📊 סיכום'],['settings','⚙️ הגדרות']].forEach(t => {
        var b = document.createElement('button');
        b.className = 'tab' + (TAB === t[0] ? ' on' : '');
        b.innerText = t[1];
        b.onclick = () => { TAB = t[0]; render(); };
        tabBar.appendChild(b);
    });
    app.appendChild(tabBar);

    var pg = document.createElement('div');
    pg.className = 'pg';

    if (TAB === 'summary') {
        pg.innerHTML = `
            <div class="card">
                <div style="color:var(--dm); font-size:12px">שלום, ${S.profile.gender === 'male' ? 'חבר' : 'חברה'}</div>
                <div style="font-size:20px; font-weight:800; color:var(--ac); margin-top:5px">${S.title}</div>
            </div>
            <div class="card" style="border-right: 4px solid var(--pu)">
                <label>נתוני פנסיה (לפי פרופיל):</label>
                <div style="display:flex; justify-content:space-between; margin-top:10px">
                    <span>גיל: ${S.profile.age}</span>
                    <span style="color:var(--pu); font-weight:bold">מגדר: ${S.profile.gender === 'male' ? 'זכר' : 'נקבה'}</span>
                </div>
            </div>
        `;
    } else {
        // טאב הגדרות עם השדות שביקשת
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div style="font-weight:bold; margin-bottom:15px">הגדרות פרופיל</div>`;
        
        var lblG = document.createElement('label'); lblG.innerText = 'מגדר';
        var selG = document.createElement('select'); selG.className = 'si2';
        selG.innerHTML = `<option value="male" ${S.profile.gender==='male'?'selected':''}>זכר</option>
                          <option value="female" ${S.profile.gender==='female'?'selected':''}>נקבה</option>`;
        selG.onchange = (e) => { S.profile.gender = e.target.value; save(); };

        var lblA = document.createElement('label'); lblA.innerText = 'גיל (מספר שלם)';
        var inpA = document.createElement('input'); inpA.type = 'number'; inpA.className = 'ni2';
        inpA.value = S.profile.age;
        inpA.oninput = (e) => { S.profile.age = parseInt(e.target.value) || 0; save(); };

        card.appendChild(lblG); card.appendChild(selG);
        card.appendChild(document.createElement('br'));
        card.appendChild(lblA); card.appendChild(inpA);
        pg.appendChild(card);
    }
    app.appendChild(pg);
}

render();
</script>
</body>
</html>
