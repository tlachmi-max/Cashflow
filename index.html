<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a">
<title>התזרים שלנו</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0a0f1a; --surface: #111827; --surface-light: #1a2235;
  --border: #1e3a5f; --accent: #22d3ee; --accent-dim: #0891b2;
  --accent-glow: rgba(34,211,238,0.15);
  --green: #34d399; --red: #f87171; --orange: #fbbf24; --purple: #a78bfa;
  --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b; --white: #f8fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', Arial, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; direction: rtl; overflow-x: hidden; }
input, select, button { font-family: inherit; outline: none; }
input:focus, select:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.header { background: linear-gradient(180deg, var(--surface-light), var(--bg)); padding: 14px 16px 6px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: var(--bg); }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; }
.month-nav button { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 4px 8px; }
.month-btn { background: var(--accent-glow); border: 1px solid rgba(34,211,238,0.25); border-radius: 10px; padding: 5px 18px; color: var(--accent); font-size: 15px; font-weight: 700; cursor: pointer; }
.tabs { display: flex; gap: 3px; background: var(--bg); padding: 3px; border-radius: 12px; margin: 10px 14px 16px; }
.tab { flex: 1; padding: 8px 4px; border-radius: 9px; border: none; background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; }
.tab.active { background: var(--surface-light); color: var(--accent); font-weight: 700; box-shadow: 0 0 12px var(--accent-glow); }
.content { padding: 0 14px 80px; animation: fadeIn .3s ease; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 14px; margin-bottom: 10px; }
.section-hdr { display: flex; align-items: center; justify-content: space-between; margin: 18px 2px 12px; }
.section-title { color: var(--white); font-size: 16px; font-weight: 700; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card { background: linear-gradient(135deg, var(--surface), var(--surface-light)); border-radius: 13px; padding: 12px 14px; border: 1px solid; }
.stat-val { font-size: 21px; font-weight: 800; font-family: 'Courier New', monospace; direction: ltr; text-align: right; }
.num-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); padding: 9px 11px; font-size: 15px; width: 100%; direction: ltr; text-align: left; }
.text-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 14px; width: 100%; direction: rtl; }
.select-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 13px; width: 100%; }
label { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 3px; }
.btn { border: none; border-radius: 9px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: var(--bg); }
.btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.badge { padding: 2px 9px; border-radius: 16px; font-size: 11px; font-weight: 600; }
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.mb8 { margin-bottom: 8px; }
.btn-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; }
.fab { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); width: 54px; height: 54px; border-radius: 27px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); border: none; color: var(--bg); font-size: 27px; z-index: 50; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ========== DATA & STATE ==========
const HEB_MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const STORAGE_KEY="cashflow_v2";
const gid=()=>'id_'+Math.random().toString(36).substr(2,9);
const fmtN=n=>(+n||0).toLocaleString('he-IL');
const mKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const mLabel=k=>{const[y,m]=k.split('-');return HEB_MONTHS[+m-1]+' '+y};

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {funds:[], months:{}};
let curMonth=mKey(new Date());
let activeTab='dashboard';

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }
function ensureMonth(){ if(!state.months[curMonth]) state.months[curMonth]={dedicatedGoals:[],generalGoals:[],additionalGoals:[],miluimBudget:[],miluimTotal:0,expenses:[],transfers:[]}; }
const md=()=>state.months[curMonth];
const fund=(id)=>state.funds.find(f=>f.id===id);

// ========== HELPERS ==========
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='on') Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn));
    else if(k==='className') el.className=v;
    else if(k==='style') el.style.cssText=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c||document.createTextNode('')));
  return el;
}
const textInput=(v,cb,o={})=>h('input',{type:'text',className:'text-input',value:v||'',placeholder:o.placeholder||'',style:o.style||'',on:{input:e=>cb(e.target.value)}});
const numInput=(v,cb,o={})=>h('input',{type:'tel',className:'num-input',value:v||'',style:o.style||'',on:{input:e=>cb(parseFloat(e.target.value.replace(/[^\d.]/g,''))||0)}});

// ========== RENDER ==========
function render(){
  ensureMonth();
  const m=md();
  const app=document.getElementById('app');
  app.innerHTML='';

  // HEADER
  app.appendChild(h('div',{className:'header'},
    h('div',{className:'header-row'},
      h('div',{className:'row'},h('div',{className:'logo'},'₪'),h('div',null,h('div',{style:'color:white;font-weight:700'},'התזרים שלנו'))),
      h('button',{className:'btn btn-secondary',on:{click:()=>alert('ייצוא בקרוב')}},'📤 ייצוא')
    ),
    h('div',{className:'month-nav'},
      h('button',{on:{click:()=>{const[y,m]=curMonth.split('-');curMonth=mKey(new Date(y,m-2,1));render()}}},'‹'),
      h('button',{className:'month-btn'},mLabel(curMonth)),
      h('button',{on:{click:()=>{const[y,m]=curMonth.split('-');curMonth=mKey(new Date(y,m,1));render()}}},'›')
    )
  ));

  // TABS
  const tbs=h('div',{className:'tabs'});
  [['dashboard','📊','סיכום'],['transfers','🔄','קרנות'],['settings','⚙️','הגדרות']].forEach(([id,icon,lbl])=>{
    tbs.appendChild(h('button',{className:'tab'+(activeTab===id?' active':''),on:{click:()=>{activeTab=id;render()}}},h('div',null,icon),lbl));
  });
  app.appendChild(tbs);

  const cnt=h('div',{className:'content'});
  
  if(activeTab==='dashboard'){
    cnt.appendChild(h('div',{className:'card'},'שלום! בחר טאב כדי להתחיל לנהל.'));
  }

  // טאב קרנות (Transfers) - כאן מופיע הפירוט שביקשת
  else if(activeTab==='transfers'){
    cnt.appendChild(h('div',{className:'section-hdr'},h('div',{className:'section-title'},'🏦 פירוט קרנות כספיות')));
    state.funds.forEach(f=>{
      cnt.appendChild(h('div',{className:'card'},
        h('div',{className:'row-between'},
          h('div',null,
            h('div',{style:'color:white;font-weight:600'},f.name),
            h('div',{style:'color:var(--text-muted);font-size:11px;margin-top:4px'},
              `מס׳ קרן: ${f.accountNum || '---'} | מטרה: ${f.purpose || 'לא הוגדרה'}`
            )
          ),
          h('span',{className:'badge',style:`background:rgba(${f.type==='long'?'251,191,36':'34,211,238'},0.15);color:var(--${f.type==='long'?'orange':'accent'})`},f.type==='long'?'טווח רחוק':'שוטף')
        )
      ));
    });
  }

  // טאב הגדרות - כאן מזינים את הנתונים
  else if(activeTab==='settings'){
    cnt.appendChild(h('div',{className:'section-hdr'},
      h('div',{className:'section-title'},'⚙️ ניהול קרנות'),
      h('button',{className:'btn btn-primary',on:{click:()=>{state.funds.push({id:gid(),name:'',accountNum:'',purpose:'',type:'short'});save();render()}}},'+ הוסף קרן')
    ));
    
    state.funds.forEach((f,i)=>{
      cnt.appendChild(h('div',{className:'card'},
        h('div',{className:'row mb8'},
          textInput(f.name,v=>{f.name=v;save()},{style:'flex:1',placeholder:'שם הקרן'}),
          textInput(f.accountNum,v=>{f.accountNum=v;save()},{style:'width:90px;direction:ltr',placeholder:'מס׳ קרן'})
        ),
        h('div',{className:'mb8'},
          textInput(f.purpose,v=>{f.purpose=v;save()},{style:'width:100%',placeholder:'מטרת הקרן (למשל: חסכון ללימודים)'})
        ),
        h('div',{className:'row-between'},
          h('div',{className:'row'},
            h('button',{className:'btn',style:'font-size:11px;background:'+(f.type==='short'?'var(--accent-dim)':'var(--bg)'),on:{click:()=>{f.type='short';save();render()}}},'שוטף'),
            h('button',{className:'btn',style:'font-size:11px;background:'+(f.type==='long'?'var(--orange)':'var(--bg)'),on:{click:()=>{f.type='long';save();render()}}},'טווח רחוק')
          ),
          h('button',{className:'btn-del',on:{click:()=>{if(confirm('למחוק?')){state.funds.splice(i,1);save();render()}}}},'🗑')
        )
      ));
    });
  }

  app.appendChild(cnt);
}

render();
</script>
</body>
</html>
